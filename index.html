<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root {
            --bg-table: #2e7d32;
            --blue-back: #1565c0;
            --gold: #ffd700;
        }

        body {
            background-color: var(--bg-table);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 狀態與籌碼 */
        .status-container { margin-top: 10px; text-align: center; width: 90%; }
        .status-bar {
            background: rgba(0,0,0,0.7);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--gold);
            display: inline-block;
        }
        .money-tag { font-size: 0.7rem; color: var(--gold); margin-top: 4px; }

        .mahjong-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            max-width: 380px;
            padding: 5px;
            box-sizing: border-box;
        }

        /* 手牌區 */
        .hand-row { display: flex; justify-content: center; align-items: flex-end; min-height: 50px; gap: 1px; }
        .melds { display: flex; gap: 4px; }
        .meld-group { display: flex; border: 1px solid rgba(255,255,255,0.3); border-radius: 2px; background: rgba(255,255,255,0.1); }
        
        .tile { width: 21px; cursor: pointer; transition: transform 0.1s; }
        .tile img { width: 100%; height: auto; display: block; }
        .tile.selected { transform: translateY(-15px); filter: brightness(1.2) drop-shadow(0 0 5px #fff); }
        .draw-gap { margin-left: 8px; }

        .cpu-tile { width: 20px; height: 28px; background-color: var(--blue-back); border: 1px solid #999; border-radius: 2px; }

        /* 海底區 */
        .discard-area {
            background: rgba(0,0,0,0.15);
            border-radius: 8px;
            flex: 1;
            margin: 10px 0;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-auto-rows: 28px;
            gap: 2px;
            padding: 8px;
            overflow-y: auto;
        }
        .discard-tile { width: 20px; height: auto; margin: 0 auto; }

        /* 功能按鈕 */
        .action-bar { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .btn {
            padding: 8px 0;
            background: linear-gradient(to bottom, #fff, #d0d0d0);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            color: #111;
            flex: 1;
            box-shadow: 0 3px 0 #666;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #666; }

        /* 摸牌鍵獨立區 */
        .draw-btn-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-draw { width: 140px; background: #fff; color: #d32f2f; }

        /* 隱藏重開鍵 (保留功能供程式調用) */
        #reset-hidden { display: none; }
    </style>
</head>
<body>

<div class="status-container">
    <div class="status-bar" id="status">𓃥 白六台灣麻將 - 載入中</div>
    <div class="money-tag">白六金圓：底 100,000 / 台 20,000</div>
</div>

<div class="mahjong-area">
    <div class="hand-row">
        <div id="cpuMelds" class="melds"></div>
        <div id="cpuTiles" style="display:flex; gap:1px;"></div>
    </div>

    <div class="discard-area" id="discardPile"></div>
    
    <div class="action-bar">
        <button class="btn" onclick="game.handleAction('chi')">吃牌</button>
        <button class="btn" onclick="game.handleAction('peng')">碰</button>
        <button class="btn" onclick="game.handleAction('gang')">槓</button>
        <button class="btn" onclick="game.handleAction('win')">胡</button>
    </div>

    <div class="hand-row" id="playerArea">
        <div id="playerMelds" class="melds"></div>
        <div id="playerTiles" class="hand-row" style="min-height:auto;"></div>
    </div>
</div>

<div class="draw-btn-container">
    <button class="btn btn-draw" onclick="game.handleAction('drawOrDiscard')">摸牌 / 出牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], cpuHand = [], cpuMelds = [];
    let lastDiscard = null, playerDraw = null, cpuDraw = null, turn = 'player';
    let selectedIndices = [];

    const sortTiles = (h) => h.sort((a,b) => {
        const w = {m:0, p:10, s:20, z:30};
        return (parseInt(a[0]) + w[a[1]]) - (parseInt(b[0]) + w[b[1]]);
    });

    const init = () => {
        deck = [];
        ['m', 'p', 's'].forEach(t => { for(let i=1; i<=9; i++) for(let j=0; j<4; j++) deck.push(`${i}${t}`); });
        for(let i=1; i<=7; i++) for(let j=0; j<4; j++) deck.push(`${i}z`); 
        for(let i=deck.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        
        playerHand = sortTiles(deck.splice(0, 16));
        cpuHand = deck.splice(0, 16);
        playerMelds = []; cpuMelds = [];
        playerDraw = deck.pop(); cpuDraw = null;
        lastDiscard = null; selectedIndices = []; turn = 'player';
        document.getElementById('discardPile').innerHTML = '';
        updateStatus("遊戲開始，請選一張牌打出");
        render();
    };

    const updateStatus = (msg) => document.getElementById('status').innerText = msg;

    const render = () => {
        // 玩家渲染
        const pTiles = document.getElementById('playerTiles');
        document.getElementById('playerMelds').innerHTML = playerMelds.map(m => `
            <div class="meld-group">${m.map(t => `<div class="tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>
        `).join('');
        
        pTiles.innerHTML = '';
        let pAll = [...playerHand]; if(playerDraw) pAll.push(playerDraw);
        pAll.forEach((t, i) => {
            const div = document.createElement('div');
            const isDraw = playerDraw && (i === pAll.length - 1);
            div.className = `tile ${isDraw ? 'draw-gap' : ''} ${selectedIndices.includes(i) ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => {
                const idx = selectedIndices.indexOf(i);
                if (idx > -1) selectedIndices.splice(idx, 1);
                else selectedIndices.push(i);
                render();
            };
            pTiles.appendChild(div);
        });

        // 對手渲染
        document.getElementById('cpuMelds').innerHTML = cpuMelds.map(m => `
            <div class="meld-group">${m.map(t => `<div class="tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>
        `).join('');
        const cTiles = document.getElementById('cpuTiles');
        cTiles.innerHTML = Array(cpuHand.length).fill('<div class="cpu-tile"></div>').join('');
        if(cpuDraw) cTiles.innerHTML += '<div class="cpu-tile draw-gap"></div>';
    };

    // AI 對手邏輯
    const cpuDecision = () => {
        if (deck.length === 0) { alert("平局！"); return; }
        setTimeout(() => {
            // 對手摸牌
            cpuDraw = true; render();
            setTimeout(() => {
                cpuDraw = false;
                // AI 簡單邏輯：隨機打出一張
                const discIdx = Math.floor(Math.random() * cpuHand.length);
                lastDiscard = cpuHand.splice(discIdx, 1)[0];
                document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${lastDiscard}.svg">`;
                updateStatus(`對方打出 ${lastDiscard}，輪到你操作`);
                turn = 'player';
                render();
            }, 600);
        }, 800);
    };

    const handleAction = (type) => {
        let all = [...playerHand]; if(playerDraw) all.push(playerDraw);

        if (type === 'drawOrDiscard') {
            if (selectedIndices.length === 1) {
                // 出牌
                let disc = all.splice(selectedIndices[0], 1)[0];
                document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${disc}.svg">`;
                playerHand = sortTiles(all); playerDraw = null; selectedIndices = [];
                turn = 'cpu'; updateStatus("對方思考中..."); render();
                cpuDecision();
            } else if (!playerDraw && turn === 'player') {
                // 摸牌
                playerDraw = deck.pop(); updateStatus("已摸牌，請選一張捨棄或槓牌"); render();
            }
        } else if (type === 'chi' || type === 'peng' || type === 'gang') {
            const selectedTiles = selectedIndices.map(i => all[i]);
            let isValid = false;
            let group = [];

            if (type === 'gang') {
                // 暗槓：摸牌後選 4 張相同
                if (playerDraw && selectedIndices.length === 4 && selectedTiles.every(t => t === selectedTiles[0])) {
                    isValid = true; group = [...selectedTiles];
                } 
                // 明槓：對方出牌後選 3 張相同
                else if (selectedIndices.length === 3 && selectedTiles.every(t => t === lastDiscard)) {
                    isValid = true; group = [...selectedTiles, lastDiscard];
                }
            } else if (type === 'peng' && selectedIndices.length === 2 && selectedTiles.every(t => t === lastDiscard)) {
                isValid = true; group = [lastDiscard, lastDiscard, lastDiscard];
            } else if (type === 'chi' && selectedIndices.length === 2) {
                const combined = [...selectedTiles, lastDiscard];
                const vals = combined.filter(t => t[1] === lastDiscard[1]).map(t => parseInt(t[0])).sort();
                if (vals.length === 3 && (vals[2]-vals[1]===1 && vals[1]-vals[0]===1)) {
                    isValid = true; group = sortTiles(combined);
                }
            }

            if (isValid) {
                playerMelds.push(group);
                selectedIndices.sort((a,b) => b-a).forEach(i => all.splice(i, 1));
                playerHand = sortTiles(all);
                playerDraw = deck.pop(); // 槓/吃/碰後自動補牌
                selectedIndices = [];
                updateStatus("組合成立！請選擇一張牌打出。");
                render();
            } else {
                updateStatus("不符合規則，請先按功能鍵再選牌。");
            }
        } else if (type === 'win') {
            alert("𓃥 胡牌！結算白六金圓中...");
        }
    };

    return { init, handleAction };
})();

window.onload = game.init;
</script>
</body>
</html>
