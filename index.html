<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root {
            --bg-table: #2e7d32;
            --back-w: 20px;
            --back-h: 28px;
            --blue-back: #1565c0;
            --tile-gap: 1px;
        }

        body {
            background-color: var(--bg-table);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        .status-bar {
            margin-top: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            min-height: 20px;
            text-align: center;
            border: 1px solid #ffd700;
        }

        .mahjong-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            max-width: 380px;
            padding: 5px;
            box-sizing: border-box;
        }

        .hand {
            display: flex;
            justify-content: center;
            gap: var(--tile-gap);
            min-height: 50px;
            align-items: flex-end;
            margin-bottom: 5px;
        }

        .melds { display: flex; gap: 4px; }
        .meld-group { display: flex; gap: 0px; border: 1px solid rgba(255,255,255,0.4); border-radius: 2px; background: rgba(255,255,255,0.1); }

        .tile {
            width: 21px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .tile img { width: 100%; height: auto; display: block; }
        .tile.selected { transform: translateY(-15px); filter: brightness(1.2) drop-shadow(0 0 5px #fff); }

        .cpu-tile {
            width: var(--back-w);
            height: var(--back-h);
            background-color: var(--blue-back);
            border: 1px solid #999;
            border-radius: 2px;
        }

        .discard-area {
            background: rgba(0,0,0,0.15);
            border-radius: 8px;
            flex: 1;
            margin: 10px 0;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-auto-rows: 30px;
            gap: 2px;
            padding: 8px;
            overflow-y: auto;
        }

        .discard-tile { width: 22px; height: auto; margin: 0 auto; }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }

        .btn {
            padding: 10px 2px;
            background: linear-gradient(to bottom, #fff, #d0d0d0);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            color: #1a1a1a;
            flex: 1;
            box-shadow: 0 3px 0 #666;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #666; }
        
        .draw-gap { margin-left: 10px; }

        .money-tag {
            font-size: 0.7rem;
            color: #ffd700;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="status-bar" id="status">𓃥 白六台灣麻將</div>
<div class="money-tag">籌碼：白六金圓 (底 100000 / 每台 20000)</div>

<div class="mahjong-area">
    <!-- 對手區 -->
    <div id="cpuArea" class="hand">
        <div id="cpuMelds" class="melds"></div>
        <div id="cpuTiles" style="display:flex; gap:1px;"></div>
    </div>

    <!-- 海底區 -->
    <div class="discard-area" id="discardPile"></div>
    
    <!-- 操作按鈕 -->
    <div class="action-bar">
        <button class="btn" onclick="game.action('drawOrDiscard')">摸入/捨去</button>
        <button class="btn" onclick="game.action('chi')">吃牌</button>
        <button class="btn" onclick="game.action('peng')">碰</button>
        <button class="btn" onclick="game.action('gang')">槓</button>
        <button class="btn" onclick="game.action('win')">胡</button>
    </div>

    <!-- 玩家區 -->
    <div class="hand" id="playerArea">
        <div id="playerMelds" class="melds"></div>
        <div id="playerTiles" class="hand" style="min-height:auto;"></div>
    </div>
</div>

<button class="btn" style="width:120px; margin-bottom:15px;" onclick="game.init()">重新開局</button>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], cpuHandCount = 16;
    let cpuMelds = [], lastDiscard = null, playerDraw = null, cpuDraw = null;
    let selectedIndices = [];

    const sortTiles = (h) => h.sort((a,b) => {
        const w = {m:0, p:10, s:20, z:30};
        return (parseInt(a[0]) + w[a[1]]) - (parseInt(b[0]) + w[b[1]]);
    });

    const init = () => {
        deck = [];
        ['m', 'p', 's'].forEach(t => { for(let i=1; i<=9; i++) for(let j=0; j<4; j++) deck.push(`${i}${t}`); });
        for(let i=1; i<=7; i++) for(let j=0; j<4; j++) deck.push(`${i}z`); 
        for(let i=deck.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        
        playerHand = sortTiles(deck.splice(0, 16));
        playerMelds = [];
        cpuMelds = [];
        cpuHandCount = 16;
        playerDraw = deck.pop();
        cpuDraw = null;
        lastDiscard = null;
        selectedIndices = [];
        document.getElementById('discardPile').innerHTML = '';
        updateStatus("𓃥 白六金圓 準備就緒。請出牌。");
        render();
    };

    const updateStatus = (msg) => document.getElementById('status').innerText = msg;

    const render = () => {
        // 渲染玩家
        const pTiles = document.getElementById('playerTiles');
        const pMelds = document.getElementById('playerMelds');
        pMelds.innerHTML = playerMelds.map(m => `
            <div class="meld-group">${m.map(t => `<div class="tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>
        `).join('');
        
        pTiles.innerHTML = '';
        let all = [...playerHand];
        if(playerDraw) all.push(playerDraw);
        all.forEach((t, i) => {
            const div = document.createElement('div');
            const isDraw = playerDraw && (i === all.length - 1);
            div.className = `tile ${isDraw ? 'draw-gap' : ''} ${selectedIndices.includes(i) ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => {
                const idx = selectedIndices.indexOf(i);
                if (idx > -1) selectedIndices.splice(idx, 1);
                else selectedIndices.push(i);
                render();
            };
            pTiles.appendChild(div);
        });

        // 渲染對手
        const cTiles = document.getElementById('cpuTiles');
        const cMelds = document.getElementById('cpuMelds');
        cMelds.innerHTML = cpuMelds.map(m => `
            <div class="meld-group">${m.map(t => `<div class="tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>
        `).join('');
        cTiles.innerHTML = Array(cpuHandCount).fill('<div class="cpu-tile"></div>').join('');
        if(cpuDraw) cTiles.innerHTML += '<div class="cpu-tile draw-gap"></div>';
    };

    const cpuPlay = () => {
        setTimeout(() => {
            cpuDraw = true; render();
            setTimeout(() => {
                cpuDraw = false;
                lastDiscard = deck.pop();
                document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${lastDiscard}.svg">`;
                updateStatus(`對方打出 ${lastDiscard}，請決策。`);
                render();
            }, 600);
        }, 800);
    };

    const action = (type) => {
        let all = [...playerHand];
        if(playerDraw) all.push(playerDraw);

        if (type === 'drawOrDiscard') {
            if (selectedIndices.length !== 1) {
                if (!playerDraw) { playerDraw = deck.pop(); render(); }
                else { updateStatus("請選擇一張牌打出"); }
                return;
            }
            let disc = all.splice(selectedIndices[0], 1)[0];
            document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${disc}.svg">`;
            playerHand = sortTiles(all);
            playerDraw = null;
            selectedIndices = [];
            updateStatus("對方思考中...");
            render();
            cpuPlay();
        } else if (type === 'chi' || type === 'peng' || type === 'gang') {
            const selectedTiles = selectedIndices.map(i => all[i]);
            let isValid = false;
            let group = [];

            if (type === 'gang') {
                // 暗槓：手牌選 4 張相同
                if (selectedIndices.length === 4 && selectedTiles.every(t => t === selectedTiles[0])) {
                    isValid = true;
                    group = [...selectedTiles];
                } 
                // 明槓：手牌選 3 張與海底相同
                else if (selectedIndices.length === 3 && selectedTiles.every(t => t === lastDiscard)) {
                    isValid = true;
                    group = [...selectedTiles, lastDiscard];
                }
            } else if (type === 'peng') {
                if (selectedIndices.length === 2 && selectedTiles.every(t => t === lastDiscard)) {
                    isValid = true;
                    group = [lastDiscard, lastDiscard, lastDiscard];
                }
            } else if (type === 'chi') {
                const combined = [...selectedTiles, lastDiscard];
                const vals = combined.filter(t => t[1] === lastDiscard[1]).map(t => parseInt(t[0])).sort();
                if (vals.length === 3 && (vals[2]-vals[1]===1 && vals[1]-vals[0]===1)) {
                    isValid = true;
                    group = sortTiles(combined);
                }
            }

            if (isValid) {
                playerMelds.push(group);
                selectedIndices.sort((a,b) => b-a).forEach(i => all.splice(i, 1));
                playerHand = sortTiles(all);
                playerDraw = deck.pop(); // 槓牌或吃碰後補牌/維持出牌權
                selectedIndices = [];
                updateStatus(type === 'gang' ? "槓！補摸一張牌，請出牌" : "成立！請出牌");
                render();
            } else {
                updateStatus("組合不符合規則，請重新點選手牌");
            }
        } else if (type === 'win') {
            alert("𓃥 白六金圓 結算中...\n底 100,000 + 台數加乘！");
        }
    };

    return { init, action };
})();

window.onload = game.init;
</script>
</body>
</html>
