<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 34px; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; font-family: sans-serif; color: white; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        
        /* 狀態列 */
        .status-bar { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); margin-top: 10px; z-index: 10; }
        
        /* 對手區域：手牌在上面，副露緊跟在下方 */
        .opp-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px 0; background: rgba(0,0,0,0.2); }
        .opp-hand-back { width: 20px; height: 30px; background: #c62828; border-radius: 2px; border: 1px solid white; box-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .meld-group { display: flex; gap: 1px; background: rgba(0,0,0,0.2); padding: 2px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); }
        .tile-sm { width: 22px; border-radius: 2px; }
        .tile-sm.back { background: #c62828; border: 1px solid white; width: 20px; height: 28px; }

        /* 遊戲主要區域 */
        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; padding: 5px; box-sizing: border-box; overflow: hidden; }
        
        /* 海底 */
        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; height: 130px; margin: 10px 5px; display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; padding: 10px; overflow-y: auto; }
        .discard-tile { width: 24px; margin: 0 auto; }
        .discard-tile.last { border: 2px solid var(--gold); box-shadow: 0 0 8px var(--gold); }

        /* 玩家手牌 */
        .hand-scroll-view { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; padding: 15px 0; }
        .hand-container-inner { display: flex; align-items: flex-end; min-width: max-content; padding: 0 30px; gap: 3px; }
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.2s; position: relative; flex-shrink: 0; }
        .tile img { width: 100%; border-radius: 3px; display: block; box-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
        .tile.selected { transform: translateY(-15px); }
        .draw-gap { margin-left: 15px; border-left: 2px solid rgba(255,255,255,0.3); padding-left: 10px; }

        /* 按鈕與介面 */
        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 95%; height: 45px; }
        .btn { padding: 10px 0; background: #555; border: none; border-radius: 8px; font-weight: bold; flex: 1; color: #999; font-size: 0.9rem; pointer-events: none; }
        .btn.active { background: #fff; color: #333; pointer-events: auto; box-shadow: 0 4px 0 #ccc; }
        .btn.can-win { background: var(--gold) !important; color: #000; animation: win-glow 0.6s infinite alternate; pointer-events: auto; }
        
        .chi-selector-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .chi-options { background: #444; padding: 20px; border-radius: 15px; border: 2px solid var(--gold); display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        .win-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:200; }
        .win-card { background:#fff; color:#333; width:85%; max-width:320px; border-radius:15px; padding:20px; text-align:center; }
        
        .control-panel { width: 100%; display: flex; justify-content: center; padding: 10px 0 40px 0; background: rgba(0,0,0,0.2); }
        .btn-main { width: 90%; height: 55px; background: #fff; color: #d32f2f; font-size: 1.3rem; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="status-bar">𓃥 白六 | <span id="totalGold">1,800,000</span> 金圓 | 剩餘 <span id="deckCount">0</span> 張</div>

<div class="opp-area">
    <div id="oppHandUI" style="display:flex; gap:2px; margin-bottom:8px;"></div>
    <div id="oppMelds" style="display:flex; gap:8px; min-height:35px;"></div>
</div>

<div class="mahjong-area">
    <div id="discardPile" class="discard-area"></div>
    
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.openChiSelector()">吃</button>
        <button id="btn-peng" class="btn" onclick="game.executeMeld('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.executeMeld('gang')">槓</button>
        <button id="btn-win" class="btn" onclick="game.checkPlayerWin()">胡</button>
    </div>

    <div id="playerMelds" style="display:flex; gap:8px; padding-left:30px; min-height:35px;"></div>
    
    <div class="hand-scroll-view" id="handScroll">
        <div class="hand-container-inner">
            <div id="playerTiles" style="display:flex; gap:3px;"></div>
            <div id="newDrawContainer"></div>
        </div>
    </div>
</div>

<div class="control-panel">
    <button id="btn-main-action" class="btn-main" onclick="game.handleMainBtn()">摸牌</button>
</div>

<div id="chiSelector" class="chi-selector-overlay" onclick="game.closeChiSelector(event)">
    <div class="chi-options" id="chiOptionsContainer"></div>
</div>

<div id="winOverlay" class="win-overlay">
    <div class="win-card">
        <div id="winType" style="font-size:1.5rem; font-weight:bold; color:#d32f2f; margin-bottom:10px;">胡牌！</div>
        <div id="winDetails" style="text-align:left; border-top:1px solid #eee; border-bottom:1px solid #eee; padding:10px 0; margin:10px 0; font-size:0.9rem;"></div>
        <div style="font-size:1.2rem; font-weight:bold; margin-bottom:15px;">
            共 <span id="totalFans">0</span> 台 / <span id="winGoldText" style="color:#d32f2f;">0</span> 金圓
        </div>
        <button onclick="game.init(); document.getElementById('winOverlay').style.display='none';" style="width:100%; padding:12px; border:none; border-radius:8px; background:#d32f2f; color:#fff; font-weight:bold;">下一局</button>
    </div>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], oppHand = [], oppMelds = [], discards = [];
    let playerDrawTile = null, selectedIdx = null, totalGold = 1800000, state = "draw"; 

    const sortTiles = (h) => [...h].sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        return (parseInt(a) + order[a.slice(-1)]) - (parseInt(b) + order[b.slice(-1)]);
    });

    const isMahjong = (hand) => {
        const h = hand.filter(t => t && t !== "WAIT");
        if (h.length % 3 !== 2) return false;
        const counts = {}; h.forEach(t => counts[t] = (counts[t] || 0) + 1);
        for (let eye in counts) {
            if (counts[eye] >= 2) {
                const temp = [...h];
                temp.splice(temp.indexOf(eye), 1); temp.splice(temp.indexOf(eye), 1);
                if (validate(temp)) return true;
            }
        }
        return false;
    };

    const validate = (h) => {
        if (h.length === 0) return true;
        const sorted = sortTiles(h); const f = sorted[0];
        if (sorted.filter(x => x === f).length >= 3) {
            const next = [...sorted]; for(let i=0;i<3;i++) next.splice(next.indexOf(f), 1);
            if (validate(next)) return true;
        }
        const v = parseInt(f), s = f.slice(-1);
        if (s !== 'z') {
            const t2 = `${v+1}${s}`, t3 = `${v+2}${s}`;
            if (sorted.includes(t2) && sorted.includes(t3)) {
                const next = [...sorted];
                next.splice(next.indexOf(f),1); next.splice(next.indexOf(t2),1); next.splice(next.indexOf(t3),1);
                if (validate(next)) return true;
            }
        }
        return false;
    };

    const init = () => {
        deck = []; discards = []; playerMelds = []; oppMelds = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0,16)); oppHand = deck.splice(0,16);
        playerDrawTile = null; state = "draw"; selectedIdx = null; render();
    };

    const renderMeld = (meldGroup) => {
        const isAnGang = meldGroup.isAnGang;
        return `<div class="meld-group">${meldGroup.tiles.map((t, i) => {
            if (isAnGang && (i === 0 || i === 3)) return `<div class="tile-sm back"></div>`;
            return `<img class="tile-sm" src="${svgBase}${t}.svg">`;
        }).join('')}</div>`;
    };

    const render = (autoScroll = false, revealOpp = false) => {
        document.getElementById('deckCount').innerText = deck.length;
        document.getElementById('totalGold').innerText = totalGold.toLocaleString();
        
        const oppUI = document.getElementById('oppHandUI');
        oppUI.innerHTML = '';
        const finalOppHand = revealOpp ? sortTiles(oppHand) : oppHand;
        finalOppHand.forEach(t => {
            if(revealOpp) {
                const img = document.createElement('img');
                img.src = `${svgBase}${t}.svg`; img.className = 'tile-sm';
                oppUI.appendChild(img);
            } else {
                const back = document.createElement('div');
                back.className = 'opp-hand-back';
                oppUI.appendChild(back);
            }
        });

        const lastD = discards[discards.length-1];
        const canWin = isMahjong(playerDrawTile ? [...playerHand, playerDrawTile] : (lastD ? [...playerHand, lastD] : []));
        document.getElementById('btn-win').className = `btn ${canWin ? 'can-win' : ''}`;
        
        const chiBtn = document.getElementById('btn-chi'), pengBtn = document.getElementById('btn-peng'), gangBtn = document.getElementById('btn-gang');
        chiBtn.classList.remove('active'); pengBtn.classList.remove('active'); gangBtn.classList.remove('active');
        
        if (state === "draw" && lastD) {
            if (playerHand.filter(x => x === lastD).length >= 2) pengBtn.classList.add('active');
            if (playerHand.filter(x => x === lastD).length >= 3) gangBtn.classList.add('active');
            const v = parseInt(lastD), s = lastD.slice(-1);
            if (s !== 'z' && ((playerHand.includes(`${v-2}${s}`)&&playerHand.includes(`${v-1}${s}`)) || (playerHand.includes(`${v-1}${s}`)&&playerHand.includes(`${v+1}${s}`)) || (playerHand.includes(`${v+1}${s}`)&&playerHand.includes(`${v+2}${s}`)))) chiBtn.classList.add('active');
        } else if (state === "discard" && playerDrawTile) {
            const all = [...playerHand, playerDrawTile];
            const counts = {}; all.forEach(t => counts[t] = (counts[t] || 0) + 1);
            if (Object.values(counts).some(v => v === 4)) gangBtn.classList.add('active');
        }

        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${selectedIdx === i ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`; 
            div.onclick = () => handleTileClick(i);
            pt.appendChild(div);
        });

        const drawBox = document.getElementById('newDrawContainer'); drawBox.innerHTML = '';
        if(playerDrawTile && playerDrawTile !== "WAIT") {
            const div = document.createElement('div');
            div.id = "activeDrawTile";
            div.className = `tile draw-gap ${selectedIdx === playerHand.length ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`; 
            div.onclick = () => handleTileClick(playerHand.length);
            drawBox.appendChild(div);
        }

        document.getElementById('playerMelds').innerHTML = playerMelds.map(m => renderMeld(m)).join('');
        document.getElementById('oppMelds').innerHTML = oppMelds.map(m => renderMeld(m)).join('');
        
        const dp = document.getElementById('discardPile');
        dp.innerHTML = discards.map((t,idx) => `<img class="discard-tile ${idx===discards.length-1?'last':''}" src="${svgBase}${t}.svg">`).join('');
        dp.scrollTop = dp.scrollHeight;
        
        document.getElementById('btn-main-action').innerText = state === "discard" ? "選一張放出" : "摸牌";
        if (autoScroll) setTimeout(() => {
            const el = document.getElementById('activeDrawTile') || pt.lastElementChild;
            el?.scrollIntoView({ behavior: 'smooth', inline: 'end', block: 'nearest' });
        }, 100);
    };

    const opponentAI = (lastD) => {
        if (isMahjong([...oppHand, lastD])) { handleWin(false, false); return; }
        const count = oppHand.filter(x => x === lastD).length;
        if (count >= 2) {
            for(let i=0; i<count; i++) oppHand.splice(oppHand.indexOf(lastD), 1);
            oppMelds.push({tiles: new Array(count + 1).fill(lastD), isAnGang: false});
            discards.pop(); aiDiscardEvaluation(); return;
        }
        const drawn = deck.pop();
        if (isMahjong([...oppHand, drawn])) { oppHand.push(drawn); handleWin(false, true); return; }
        oppHand.push(drawn);
        const counts = {}; oppHand.forEach(t => counts[t] = (counts[t] || 0) + 1);
        const anGangTile = Object.keys(counts).find(k => counts[k] === 4);
        if (anGangTile && Math.random() > 0.3) {
            for(let i=0; i<4; i++) oppHand.splice(oppHand.indexOf(anGangTile), 1);
            oppMelds.push({tiles: new Array(4).fill(anGangTile), isAnGang: true});
            opponentAI(null); return;
        }
        aiDiscardEvaluation();
    };

    const aiDiscardEvaluation = () => {
        const scores = oppHand.map((tile, index) => {
            let score = 0; const v = parseInt(tile), s = tile.slice(-1);
            const count = oppHand.filter(x => x === tile).length;
            if (count >= 2) score += 50;
            if (s !== 'z') {
                if (oppHand.includes(`${v-1}${s}`) || oppHand.includes(`${v+1}${s}`)) score += 30;
                if (v >= 3 && v <= 7) score += 5;
            } else if (count === 1) score -= 20;
            return { index, score: score + Math.random() * 5 };
        });
        scores.sort((a, b) => a.score - b.score);
        discards.push(oppHand.splice(scores[0].index, 1)[0]);
        render();
    };

    const handleMainBtn = () => {
        if (state === "draw") {
            playerDrawTile = deck.pop(); selectedIdx = playerHand.length;
            state = "discard"; render(true);
        } else if (state === "discard") {
            if (selectedIdx === null) return;
            let all = [...playerHand]; if(playerDrawTile && playerDrawTile !== "WAIT") all.push(playerDrawTile);
            const discarded = all.splice(selectedIdx, 1)[0];
            playerHand = sortTiles(all); playerDrawTile = null; selectedIdx = null;
            discards.push(discarded); state = "draw"; render();
            setTimeout(() => opponentAI(discarded), 800);
        }
    };

    const executeMeld = (type, chiCombo = null) => {
        if (type === 'gang' && state === "discard") { 
            let all = [...playerHand, playerDrawTile];
            const counts = {}; all.forEach(t => counts[t] = (counts[t] || 0) + 1);
            const target = Object.keys(counts).find(k => counts[k] === 4);
            for(let i=0; i<4; i++) all.splice(all.indexOf(target), 1);
            playerHand = sortTiles(all); playerMelds.push({tiles: new Array(4).fill(target), isAnGang: true});
            playerDrawTile = deck.pop(); selectedIdx = playerHand.length;
            render(true); return;
        }
        const lastD = discards.pop();
        if (type === 'peng' || type === 'gang') { 
            const count = type === 'peng' ? 2 : 3;
            for(let i=0; i<count; i++) playerHand.splice(playerHand.indexOf(lastD), 1);
            playerMelds.push({tiles: new Array(count + 1).fill(lastD), isAnGang: false});
            if (type === 'gang') { playerDrawTile = deck.pop(); selectedIdx = playerHand.length; }
            else playerDrawTile = "WAIT";
        } else if (type === 'chi') {
            chiCombo.forEach(t => playerHand.splice(playerHand.indexOf(t), 1));
            playerMelds.push({tiles: sortTiles([...chiCombo, lastD]), isAnGang: false});
            playerDrawTile = "WAIT";
        }
        playerHand = sortTiles(playerHand);
        state = "discard"; selectedIdx = null; render(true);
    };

    const openChiSelector = () => {
        const lastD = discards[discards.length - 1]; if (!lastD) return;
        const v = parseInt(lastD), s = lastD.slice(-1);
        const combinations = []; const has = (n) => playerHand.includes(`${n}${s}`);
        if (has(v-2) && has(v-1)) combinations.push([`${v-2}${s}`, `${v-1}${s}`]);
        if (has(v-1) && has(v+1)) combinations.push([`${v-1}${s}`, `${v+1}${s}`]);
        if (has(v+1) && has(v+2)) combinations.push([`${v+1}${s}`, `${v+2}${s}`]);
        if (combinations.length === 1) executeMeld('chi', combinations[0]);
        else if (combinations.length > 1) {
            const container = document.getElementById('chiOptionsContainer'); container.innerHTML = '';
            combinations.forEach(combo => {
                const opt = document.createElement('div'); opt.style.display='flex'; opt.style.gap='3px';
                opt.innerHTML = sortTiles([...combo, lastD]).map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('');
                opt.onclick = () => { executeMeld('chi', combo); closeChiSelector(); };
                container.appendChild(opt);
            });
            document.getElementById('chiSelector').style.display = 'flex';
        }
    };

    const closeChiSelector = (e) => { if (!e || e.target.id === 'chiSelector') document.getElementById('chiSelector').style.display = 'none'; };

    const calculateFans = (isSelfDraw) => {
        let fans = [{name: "底", count: 0}]; 
        let all = [...playerHand]; if (playerDrawTile && playerDrawTile !== "WAIT") all.push(playerDrawTile);
        else if (!isSelfDraw) all.push(discards[discards.length-1]);
        if (isSelfDraw) fans.push({name: "自摸", count: 1});
        const counts = {}; all.forEach(t => counts[t] = (counts[t] || 0) + 1);
        const words = {'1z':'東風','2z':'南風','3z':'西風','4z':'北風','5z':'白板','6z':'發財','7z':'紅中'};
        for (let code in words) {
            let total = (counts[code] || 0);
            playerMelds.forEach(m => { if(m.tiles[0] === code) total += 3; });
            if (total >= 3) fans.push({name: words[code], count: 1});
        }
        playerMelds.forEach(m => { if(m.isAnGang) fans.push({name: "暗槓", count: 1}); });
        const suits = new Set(all.map(t => t.slice(-1)).concat(playerMelds.flatMap(m => m.tiles.map(t => t.slice(-1)))));
        if (suits.size === 1) fans.push({name: "清一色", count: 8});
        return fans;
    };

    const handleWin = (isP, isSelfDraw) => {
        render(false, true);
        if (isP) {
            const fans = calculateFans(isSelfDraw);
            const totalFans = fans.reduce((s, f) => s + f.count, 0);
            const goldEarned = 10000 + (totalFans * 5000);
            totalGold += goldEarned;
            document.getElementById('winType').innerText = isSelfDraw ? "自摸！" : "胡牌！";
            document.getElementById('winDetails').innerHTML = fans.map(f => `<div class="fan-item"><span>${f.name}</span><span>${f.count} 台</span></div>`).join('');
            document.getElementById('totalFans').innerText = totalFans;
            document.getElementById('winGoldText').innerText = goldEarned.toLocaleString();
            document.getElementById('winOverlay').style.display = 'flex';
        } else {
            alert("對手胡牌了！"); totalGold -= 20000; setTimeout(() => init(), 3000);
        }
    };

    const handleTileClick = (idx) => {
        if (selectedIdx === null) selectedIdx = idx;
        else if (selectedIdx === idx) selectedIdx = null;
        else {
            if (selectedIdx < playerHand.length && idx < playerHand.length) {
                [playerHand[selectedIdx], playerHand[idx]] = [playerHand[idx], playerHand[selectedIdx]];
                selectedIdx = null;
            } else selectedIdx = idx;
        }
        render();
    };

    const checkPlayerWin = () => {
        const lastD = discards[discards.length-1];
        if (playerDrawTile && playerDrawTile !== "WAIT" && isMahjong([...playerHand, playerDrawTile])) handleWin(true, true);
        else if (isMahjong([...playerHand, lastD])) { discards.pop(); handleWin(true, false); }
    };

    return { init, handleMainBtn, executeMeld, openChiSelector, closeChiSelector, checkPlayerWin };
})();
window.onload = game.init;
</script>
</body>
</html>
