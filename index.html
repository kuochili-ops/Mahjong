<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 32px; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; font-family: sans-serif; color: white; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .status-bar { background: rgba(0,0,0,0.8); padding: 4px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); margin-top: 10px; display: flex; align-items: center; gap: 8px; z-index: 10; }
        .opp-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 5px 0; min-height: 90px; background: rgba(0,0,0,0.3); }
        .opp-hand-display { display: flex; gap: 2px; }
        .meld-group { display: flex; gap: 1px; background: rgba(255,255,255,0.1); padding: 2px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); }
        .tile-sm { width: 20px; border-radius: 2px; }
        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; padding: 5px; box-sizing: border-box; }
        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; flex: 1; margin: 5px; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 32px; gap: 4px; padding: 8px; overflow-y: auto; }
        .discard-tile { width: 24px; margin: 0 auto; }
        .discard-tile.last { border: 2px solid var(--gold); box-shadow: 0 0 5px var(--gold); }
        .hand-scroll-container { width: 100%; overflow-x: auto; padding: 10px 0; scroll-behavior: smooth; }
        .hand-row { display: inline-flex; align-items: flex-end; min-height: 60px; gap: 3px; padding: 0 20px; }
        .meld-zone { display: flex; gap: 5px; margin-right: 8px; border-right: 1px solid rgba(255,255,255,0.3); }
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.1s; }
        .tile img { width: 100%; border-radius: 3px; display: block; }
        .tile.selected { transform: translateY(-12px); outline: 2px solid var(--gold); }
        .draw-gap { margin-left: 15px; position: relative; }
        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 95%; }
        .btn { padding: 10px 0; background: #e0e0e0; border: none; border-radius: 6px; font-weight: bold; flex: 1; color: #333; font-size: 0.9rem; }
        .btn.active-mode { background: var(--gold) !important; color: #000; }
        .control-panel { width: 100%; display: flex; justify-content: center; padding: 10px 0 30px 0; background: rgba(0,0,0,0.2); }
        .btn-main { width: 90%; height: 50px; background: #fff; color: #d32f2f; font-size: 1.2rem; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
<div class="status-bar">𓃥 白六 | <span id="totalGold">1,800,000</span> 金圓 <span id="goldChange"></span></div>
<div class="opp-area">
    <div id="oppStatus" style="font-size:0.7rem; color:var(--gold); margin-bottom:2px;">對手牌區</div>
    <div id="oppHandReveal" class="opp-hand-display"></div>
    <div id="oppMelds" style="display:flex; gap:8px; margin-top:5px;"></div>
</div>
<div class="mahjong-area">
    <div id="discardPile" class="discard-area"></div>
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.modeToggle('chi')">吃</button>
        <button id="btn-peng" class="btn" onclick="game.modeToggle('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.handleGangLogic()">槓</button>
        <button id="btn-win" class="btn" style="background:var(--gold)" onclick="game.handleWin(true)">胡</button>
    </div>
    <div id="scrollContainer" class="hand-scroll-container">
        <div class="hand-row">
            <div id="playerMelds" class="meld-zone"></div>
            <div id="playerTiles" style="display:flex; gap:3px;"></div>
        </div>
    </div>
</div>
<div class="control-panel">
    <button id="btn-main-action" class="btn-main" onclick="game.userAction()">摸牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], oppHand = [], oppMelds = [], discards = [];
    let playerDrawTile = null, selectedIndices = [], activeMode = null;
    let totalGold = 1800000;

    const sortTiles = (h) => [...h].sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        return (parseInt(a) + order[a.slice(-1)]) - (parseInt(b) + order[b.slice(-1)]);
    });

    const init = () => {
        deck = []; discards = []; playerMelds = []; oppMelds = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0,16)); 
        oppHand = sortTiles(deck.splice(0,16)); 
        playerDrawTile = null; selectedIndices = []; activeMode = null;
        document.getElementById('oppHandReveal').innerHTML = '';
        render();
    };

    const render = () => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-mode'));
        if(activeMode && activeMode !== 'win') document.getElementById(`btn-${activeMode}`).classList.add('active-mode');

        document.getElementById('oppMelds').innerHTML = oppMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${selectedIndices.includes(i)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`; 
            div.onclick = () => toggleSelect(i); pt.appendChild(div);
        });
        if(playerDrawTile) {
            const idx = playerHand.length;
            const div = document.createElement('div');
            div.className = `tile draw-gap ${selectedIndices.includes(idx)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`; 
            div.onclick = () => toggleSelect(idx); pt.appendChild(div);
        }
        document.getElementById('playerMelds').innerHTML = playerMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        document.getElementById('discardPile').innerHTML = discards.map((t,idx) => `<img class="discard-tile ${idx===discards.length-1?'last':''}" src="${svgBase}${t}.svg">`).join('');
        document.getElementById('totalGold').innerText = totalGold.toLocaleString();
        
        const mainBtn = document.getElementById('btn-main-action');
        if (activeMode) mainBtn.innerText = "確認組合";
        else mainBtn.innerText = (playerDrawTile) ? "選擇放牌" : "摸牌";
    };

    const scrollToEnd = () => {
        const container = document.getElementById('scrollContainer');
        setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
    };

    const handleGangLogic = () => {
        // 1. 摸牌後的 加槓 或 暗槓
        if (playerDrawTile) {
            // 加槓
            for (let i = 0; i < playerMelds.length; i++) {
                if (playerMelds[i].length === 3 && playerMelds[i][0] === playerDrawTile) {
                    if (confirm(`執行 ${playerDrawTile} 加槓？`)) {
                        playerMelds[i].push(playerDrawTile);
                        playerDrawTile = deck.pop();
                        render(); scrollToEnd(); return;
                    }
                }
            }
            // 暗槓
            const all = [...playerHand, playerDrawTile];
            const counts = {}; all.forEach(t => counts[t] = (counts[t] || 0) + 1);
            for (let t in counts) if (counts[t] === 4) {
                if (confirm(`暗槓 ${t}？`)) {
                    playerHand = all.filter(tile => tile !== t);
                    playerMelds.push([t, t, t, t]);
                    playerDrawTile = deck.pop();
                    render(); scrollToEnd(); return;
                }
            }
        }
        // 2. 對手丟牌後的 明槓
        game.modeToggle('gang');
    };

    const userAction = () => {
        if (activeMode) {
            const lastD = discards.pop();
            const picked = selectedIndices.map(idx => (idx === playerHand.length) ? playerDrawTile : playerHand[idx]);
            playerHand = playerHand.filter((_, idx) => !selectedIndices.includes(idx));
            playerMelds.push(sortTiles([...picked, lastD]));
            if (activeMode === 'gang') { playerDrawTile = deck.pop(); scrollToEnd(); }
            activeMode = null; selectedIndices = []; render(); return;
        }

        if (!playerDrawTile) { 
            playerDrawTile = deck.pop(); 
            render(); scrollToEnd(); 
            return; 
        }

        if (selectedIndices.length === 1) {
            let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
            const discarded = all.splice(selectedIndices[0], 1)[0];
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = [];
            discards.push(discarded); render();
            setTimeout(() => opponentTurn(discarded), 600);
        }
    };

    const opponentTurn = (lastD) => {
        oppHand.push(deck.pop());
        oppHand = sortTiles(oppHand);
        discards.push(oppHand.splice(Math.floor(Math.random()*oppHand.length), 1)[0]);
        render();
    };

    const toggleSelect = (i) => {
        if (activeMode) {
            const target = (activeMode === 'chi' || activeMode === 'peng') ? 2 : 3;
            const pos = selectedIndices.indexOf(i);
            if (pos > -1) selectedIndices.splice(pos, 1);
            else if (selectedIndices.length < target) selectedIndices.push(i);
        } else {
            selectedIndices = [i];
        }
        render();
    };

    const modeToggle = (m) => { activeMode = (activeMode === m) ? null : m; selectedIndices = []; render(); };

    return { init, userAction, modeToggle, handleGangLogic };
})();
window.onload = game.init;
</script>
</body>
</html>
