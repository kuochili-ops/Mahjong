<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { 
            --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 32px;
        }
        body { 
            background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; 
            align-items: center; height: 100dvh; font-family: sans-serif; color: white; 
            overflow: hidden; padding-bottom: env(safe-area-inset-bottom);
        }
        /* 狀態列 */
        .status-container { margin-top: 5px; text-align: center; width: 95%; }
        .status-bar { background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; border: 1px solid var(--gold); display: inline-block; }
        
        /* 對手區 */
        .opp-area { width: 100%; display: flex; justify-content: center; padding: 5px 0; background: rgba(0,0,0,0.1); min-height: 40px; }
        .meld-group { display: flex; gap: 1px; background: rgba(255,255,255,0.1); padding: 1px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2); }
        .meld-tile-sm { width: 20px; }

        /* 牌桌中央 */
        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; padding: 5px; box-sizing: border-box; }
        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; flex: 1; margin: 5px; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 30px; gap: 3px; padding: 8px; overflow-y: auto; }
        .discard-tile { width: 22px; margin: 0 auto; }
        .discard-tile.last { border: 2px solid var(--gold); box-shadow: 0 0 5px var(--gold); }
        
        /* 玩家手牌區 */
        .hand-scroll-container { width: 100%; overflow-x: auto; padding: 10px 0; scroll-behavior: smooth; }
        .hand-row { display: inline-flex; align-items: flex-end; min-height: 60px; gap: 3px; padding: 0 10px; }
        .meld-zone { display: flex; gap: 5px; margin-right: 8px; border-right: 1px solid rgba(255,255,255,0.3); padding-right: 8px; }
        
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.1s; position: relative; }
        .tile img { width: 100%; border-radius: 3px; display: block; }
        .tile.selected { transform: translateY(-12px); filter: brightness(1.2); outline: 2px solid var(--gold); }
        .tile.disabled { opacity: 0.4; pointer-events: none; }
        .draw-gap { margin-left: 10px; }

        /* 按鈕控制 */
        @keyframes flash-white { 0%, 100% { background: #e0e0e0; } 50% { background: #fff; box-shadow: 0 0 10px #fff; } }
        .btn { padding: 8px 0; background: #e0e0e0; border: none; border-radius: 6px; font-weight: bold; flex: 1; color: #333; font-size: 0.85rem; box-shadow: 0 3px 0 #888; }
        .btn.hint { animation: flash-white 0.8s infinite; }
        .btn.active-mode { background: var(--gold) !important; color: #000; box-shadow: 0 3px 0 #b8860b; }
        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 5px; width: 95%; }
        
        .control-panel { width: 100%; display: flex; justify-content: center; padding: 10px 0 20px 0; }
        .btn-main { width: 200px; height: 44px; background: #fff; color: #d32f2f; font-size: 1rem; border: 2px solid #d32f2f; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
<div class="status-container">
    <div class="status-bar">𓃥 白六台灣麻將 | <span id="totalGold">1,800,000</span> 金圓</div>
</div>

<!-- 對手組合牌區 -->
<div class="opp-area">
    <div id="oppMelds" style="display:flex; gap:8px;"></div>
</div>

<div class="mahjong-area">
    <div id="discardPile" class="discard-area"></div>
    
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.modeToggle('chi')">吃</button>
        <button id="btn-peng" class="btn" onclick="game.modeToggle('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.modeToggle('gang')">槓</button>
        <button id="btn-win" class="btn" style="background:var(--gold)" onclick="game.handleWin()">胡</button>
    </div>

    <div id="scrollContainer" class="hand-scroll-container">
        <div class="hand-row">
            <div id="playerMelds" class="meld-zone"></div>
            <div id="playerTiles" style="display:flex; gap:3px;"></div>
        </div>
    </div>
</div>

<div class="control-panel">
    <button id="btn-main-action" class="btn btn-main" onclick="game.userAction()">摸牌 / 出牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], oppMelds = [], discards = [];
    let playerDrawTile = null, selectedIndices = [], activeMode = null;
    let isWaitingForDiscardAfterMeld = false; 
    let totalGold = 1800000;

    const sortTiles = (h) => h.sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        return (parseInt(a) + order[a.slice(-1)]) - (parseInt(b) + order[b.slice(-1)]);
    });

    const init = () => {
        deck = []; discards = []; playerMelds = []; oppMelds = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0,16)); 
        isWaitingForDiscardAfterMeld = false;
        render();
    };

    const render = () => {
        // 渲染對手組合牌
        document.getElementById('oppMelds').innerHTML = oppMelds.map(g => `
            <div class="meld-group">${g.map(t=>`<img class="meld-tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>
        `).join('');

        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        const lastD = discards[discards.length-1];
        
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            let isDisabled = false;
            if (activeMode === 'chi') {
                const n = parseInt(lastD), s = lastD.slice(-1);
                const valid = new Set([[n-2,n-1],[n-1,n+1],[n+1,n+2]].filter(p=>p.every(v=>v>=1&&v<=9&&playerHand.includes(v+s))).flat().map(v=>v+s));
                if (!valid.has(t)) isDisabled = true;
            } else if ((activeMode === 'peng' || activeMode === 'gang') && t !== lastD) isDisabled = true;

            div.className = `tile ${selectedIndices.includes(i)?'selected':''} ${isDisabled?'disabled':''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`; 
            div.onclick = () => toggleSelect(i); pt.appendChild(div);
        });

        if(playerDrawTile) {
            const i = playerHand.length;
            const div = document.createElement('div');
            div.className = `tile draw-gap ${selectedIndices.includes(i)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`; 
            div.onclick = () => toggleSelect(i); pt.appendChild(div);
        }

        document.getElementById('playerMelds').innerHTML = playerMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="meld-tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        document.getElementById('discardPile').innerHTML = discards.map((t,idx) => `<img class="discard-tile ${idx===discards.length-1?'last':''}" src="${svgBase}${t}.svg">`).join('');
        document.getElementById('totalGold').innerText = totalGold.toLocaleString();
        
        updateButtons(lastD);
    };

    const updateButtons = (lastD) => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('hint', 'active-mode'));
        if(!lastD || playerDrawTile || isWaitingForDiscardAfterMeld) return;

        if(playerHand.filter(t => t === lastD).length >= 2) document.getElementById('btn-peng').classList.add('hint');
        if(playerHand.filter(t => t === lastD).length === 3) document.getElementById('btn-gang').classList.add('hint');
        if(!lastD.endsWith('z')) {
            const n = parseInt(lastD), s = lastD.slice(-1);
            if([[n-2,n-1],[n-1,n+1],[n+1,n+2]].some(p=>p.every(v=>v>=1&&v<=9&&playerHand.includes(v+s)))) document.getElementById('btn-chi').classList.add('hint');
        }
        if(activeMode) document.getElementById(`btn-${activeMode}`).classList.add('active-mode');
        document.getElementById('btn-main-action').innerText = (playerDrawTile || isWaitingForDiscardAfterMeld) ? "出牌" : "摸牌";
    };

    const modeToggle = (m) => { activeMode = (activeMode === m) ? null : m; selectedIndices = []; render(); };
    const toggleSelect = (i) => {
        if(activeMode) {
            const pos = selectedIndices.indexOf(i);
            if(pos > -1) selectedIndices.splice(pos, 1);
            else if(selectedIndices.length < 2) selectedIndices.push(i);
        } else { selectedIndices = [i]; }
        render();
    };

    const userAction = () => {
        if (activeMode) {
            const lastD = discards.pop();
            const picked = selectedIndices.map(idx => playerHand[idx]);
            playerHand = sortTiles(playerHand.filter((_, idx) => !selectedIndices.includes(idx)));
            if (activeMode === 'gang') {
                playerMelds.push([lastD, ...picked, lastD]);
                playerDrawTile = deck.pop(); // 槓後摸牌
                isWaitingForDiscardAfterMeld = false;
            } else {
                playerMelds.push(sortTiles([lastD, ...picked]));
                isWaitingForDiscardAfterMeld = true; // 吃碰後需出牌
            }
            activeMode = null; selectedIndices = []; render(); return;
        }

        if (!playerDrawTile && !isWaitingForDiscardAfterMeld) {
            playerDrawTile = deck.pop(); render();
            setTimeout(() => document.getElementById('scrollContainer').scrollLeft = 999, 100);
        } else if (selectedIndices.length === 1) {
            let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
            discards.push(all.splice(selectedIndices[0], 1)[0]);
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = [];
            isWaitingForDiscardAfterMeld = false;
            render(); 
            // 模擬電腦動作
            setTimeout(() => { 
                const compTile = deck.pop();
                // 簡單模擬電腦吃碰（10%機率碰）
                if (discards.length > 0 && Math.random() < 0.1) {
                    const d = discards.pop();
                    oppMelds.push([d, d, d]);
                }
                discards.push(compTile); render(); 
            }, 600);
        }
    };

    const canWin = (tiles) => {
        if (tiles.length % 3 !== 2) return false;
        const counts = {}; tiles.forEach(t => counts[t] = (counts[t] || 0) + 1);
        for (let eye in counts) {
            if (counts[eye] >= 2) {
                const rem = [...tiles];
                rem.splice(rem.indexOf(eye), 1); rem.splice(rem.indexOf(eye), 1);
                if (checkRecursive(rem)) return true;
            }
        }
        return false;
    };

    const checkRecursive = (tiles) => {
        if (tiles.length === 0) return true;
        tiles.sort((a,b) => (parseInt(a)+({m:0,p:100,s:200,z:300}[a.slice(-1)])) - (parseInt(b)+({m:0,p:100,s:200,z:300}[b.slice(-1)])));
        const f = tiles[0];
        if (tiles.filter(t => t === f).length >= 3) {
            const next = [...tiles]; next.splice(0, 3);
            if (checkRecursive(next)) return true;
        }
        if (!f.endsWith('z')) {
            const n = parseInt(f), s = f.slice(-1);
            if (tiles.includes((n+1)+s) && tiles.includes((n+2)+s)) {
                const next = [...tiles];
                next.splice(next.indexOf(f), 1); next.splice(next.indexOf((n+1)+s), 1); next.splice(next.indexOf((n+2)+s), 1);
                if (checkRecursive(next)) return true;
            }
        }
        return false;
    };

    const handleWin = () => {
        let all = [...playerHand]; let ziMo = false;
        if (playerDrawTile) { all.push(playerDrawTile); ziMo = true; }
        else if (discards.length > 0) { all.push(discards[discards.length-1]); }
        if (canWin(all)) {
            let tai = 1 + (ziMo?1:0) + (playerMelds.length===0?1:0);
            const win = 5000 + (tai * 2000); totalGold += win;
            alert(`${ziMo?'自摸':'胡牌'}！共 ${tai} 台，獲得 ${win.toLocaleString()} 金圓`);
            init();
        } else {
            totalGold -= 30000; alert("炸胡！扣除 30,000 金圓"); render();
        }
    };

    return { init, userAction, handleWin, modeToggle };
})();
window.onload = game.init;
</script>
</body>
</html>
