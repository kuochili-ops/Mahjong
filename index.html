<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 32px; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; font-family: sans-serif; color: white; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .status-bar { background: rgba(0,0,0,0.8); padding: 4px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); margin-top: 10px; }
        .opp-area { width: 100%; display: flex; justify-content: center; padding: 5px 0; min-height: 40px; }
        .meld-group { display: flex; gap: 1px; background: rgba(255,255,255,0.1); padding: 2px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); }
        .meld-tile-sm { width: 22px; }
        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; padding: 5px; box-sizing: border-box; }
        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; flex: 1; margin: 5px; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 32px; gap: 4px; padding: 8px; overflow-y: auto; }
        .discard-tile { width: 24px; margin: 0 auto; }
        .discard-tile.last { border: 2px solid var(--gold); box-shadow: 0 0 5px var(--gold); }
        .hand-row { display: inline-flex; align-items: flex-end; min-height: 60px; gap: 3px; padding: 0 10px; }
        .meld-zone { display: flex; gap: 5px; margin-right: 8px; border-right: 1px solid rgba(255,255,255,0.3); }
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.1s; }
        .tile img { width: 100%; border-radius: 3px; display: block; }
        .tile.selected { transform: translateY(-12px); outline: 2px solid var(--gold); }
        .tile.disabled { opacity: 0.3; pointer-events: none; }
        .draw-gap { margin-left: 10px; }
        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 95%; }
        .btn { padding: 10px 0; background: #e0e0e0; border: none; border-radius: 6px; font-weight: bold; flex: 1; color: #333; font-size: 0.9rem; }
        .btn.active-mode { background: var(--gold) !important; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .control-panel { width: 100%; display: flex; justify-content: center; padding: 10px 0 30px 0; background: rgba(0,0,0,0.2); }
        .btn-main { width: 90%; height: 50px; background: #fff; color: #d32f2f; font-size: 1.2rem; border: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 0 #bbb; }
    </style>
</head>
<body>
<div class="status-bar">𓃥 白六台灣麻將 | <span id="totalGold">1,800,000</span> 金圓</div>
<div class="opp-area"><div id="oppMelds" style="display:flex; gap:8px;"></div></div>
<div class="mahjong-area">
    <div id="discardPile" class="discard-area"></div>
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.modeToggle('chi')">吃</button>
        <button id="btn-peng" class="btn" onclick="game.modeToggle('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.modeToggle('gang')">槓</button>
        <button id="btn-win" class="btn" style="background:var(--gold)" onclick="game.handleWin()">胡</button>
    </div>
    <div style="width: 100%; overflow-x: auto;">
        <div class="hand-row">
            <div id="playerMelds" class="meld-zone"></div>
            <div id="playerTiles" style="display:flex; gap:3px;"></div>
        </div>
    </div>
</div>
<div class="control-panel">
    <button id="btn-main-action" class="btn-main" onclick="game.userAction()">摸牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], oppMelds = [], discards = [];
    let playerDrawTile = null, selectedIndices = [], activeMode = null;
    let isWaitingForDiscard = false;
    let totalGold = 1800000;

    const sortTiles = (h) => h.sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        return (parseInt(a) + order[a.slice(-1)]) - (parseInt(b) + order[b.slice(-1)]);
    });

    const init = () => {
        deck = []; discards = []; playerMelds = []; oppMelds = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0,16)); 
        playerDrawTile = null; isWaitingForDiscard = false; selectedIndices = []; activeMode = null;
        render();
    };

    const render = () => {
        document.getElementById('oppMelds').innerHTML = oppMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="meld-tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        const lastD = discards[discards.length-1];
        
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            let isDisabled = false;
            if (activeMode === 'chi') {
                const n = parseInt(lastD), s = lastD.slice(-1);
                const valid = new Set([[n-2,n-1],[n-1,n+1],[n+1,n+2]].filter(p=>p.every(v=>v>=1&&v<=9&&playerHand.includes(v+s))).flat().map(v=>v+s));
                if (!valid.has(t)) isDisabled = true;
            } else if ((activeMode === 'peng' || activeMode === 'gang') && t !== lastD) isDisabled = true;

            div.className = `tile ${selectedIndices.includes(i)?'selected':''} ${isDisabled?'disabled':''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`; 
            div.onclick = () => toggleSelect(i); pt.appendChild(div);
        });

        if(playerDrawTile) {
            const idx = playerHand.length;
            const div = document.createElement('div');
            div.className = `tile draw-gap ${selectedIndices.includes(idx)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`; 
            div.onclick = () => toggleSelect(idx); pt.appendChild(div);
        }

        document.getElementById('playerMelds').innerHTML = playerMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="meld-tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        document.getElementById('discardPile').innerHTML = discards.map((t,idx) => `<img class="discard-tile ${idx===discards.length-1?'last':''}" src="${svgBase}${t}.svg">`).join('');
        document.getElementById('totalGold').innerText = totalGold.toLocaleString();
        
        const mainBtn = document.getElementById('btn-main-action');
        if (activeMode) mainBtn.innerText = "確認組合";
        else if (isWaitingForDiscard || playerDrawTile) mainBtn.innerText = "選擇放牌";
        else mainBtn.innerText = "摸牌";

        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-mode'));
        if(activeMode) document.getElementById(`btn-${activeMode}`).classList.add('active-mode');
    };

    const modeToggle = (m) => { if (isWaitingForDiscard || playerDrawTile) return; activeMode = (activeMode === m) ? null : m; selectedIndices = []; render(); };
    const toggleSelect = (i) => {
        if(activeMode) {
            const target = (activeMode === 'gang') ? 3 : 2;
            const pos = selectedIndices.indexOf(i);
            if(pos > -1) selectedIndices.splice(pos, 1);
            else if(selectedIndices.length < target) selectedIndices.push(i);
        } else { selectedIndices = [i]; }
        render();
    };

    const userAction = () => {
        if (activeMode) {
            const target = (activeMode === 'gang') ? 3 : 2;
            if (selectedIndices.length !== target) return;
            const lastD = discards.pop();
            const picked = selectedIndices.map(idx => (idx === playerHand.length) ? playerDrawTile : playerHand[idx]);
            playerHand = playerHand.filter((_, idx) => !selectedIndices.includes(idx));
            if (activeMode === 'gang') {
                playerMelds.push([lastD, ...picked, lastD]);
                playerDrawTile = deck.pop(); 
            } else {
                playerMelds.push(sortTiles([lastD, ...picked]));
                isWaitingForDiscard = true;
            }
            activeMode = null; selectedIndices = []; render(); return;
        }

        if (!playerDrawTile && !isWaitingForDiscard) {
            playerDrawTile = deck.pop(); render(); return;
        }

        if (selectedIndices.length === 1) {
            let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
            discards.push(all.splice(selectedIndices[0], 1)[0]);
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = [];
            isWaitingForDiscard = false; render();
            setTimeout(() => { discards.push(deck.pop()); render(); }, 600);
        }
    };

    // 高精確胡牌演算法 (五副一對)
    const canWin = (tiles) => {
        if (tiles.length % 3 !== 2) return false;
        const counts = {}; tiles.forEach(t => counts[t] = (counts[t] || 0) + 1);
        for (let eye in counts) {
            if (counts[eye] >= 2) {
                const rem = [...tiles];
                rem.splice(rem.indexOf(eye), 1); rem.splice(rem.indexOf(eye), 1);
                if (checkSets(rem)) return true;
            }
        }
        return false;
    };

    const checkSets = (tiles) => {
        if (tiles.length === 0) return true;
        tiles.sort((a,b) => (parseInt(a)+({m:0,p:100,s:200,z:300}[a.slice(-1)])) - (parseInt(b)+({m:0,p:100,s:200,z:300}[b.slice(-1)])));
        const f = tiles[0];
        // 刻子
        if (tiles.filter(t => t === f).length >= 3) {
            const next = [...tiles]; next.splice(0, 3);
            if (checkSets(next)) return true;
        }
        // 順子
        if (!f.endsWith('z')) {
            const n = parseInt(f), s = f.slice(-1);
            const t2 = (n+1)+s, t3 = (n+2)+s;
            if (tiles.includes(t2) && tiles.includes(t3)) {
                const next = [...tiles];
                next.splice(next.indexOf(f), 1); next.splice(next.indexOf(t2), 1); next.splice(next.indexOf(t3), 1);
                if (checkSets(next)) return true;
            }
        }
        return false;
    };

    const handleWin = () => {
        let all = [...playerHand]; 
        if (playerDrawTile) all.push(playerDrawTile);
        else if (discards.length > 0) all.push(discards[discards.length-1]);
        
        if (canWin(all)) {
            totalGold += 50000; alert("恭喜胡牌！獲得 50,000 金圓"); init();
        } else {
            totalGold -= 10000; alert("尚未聽牌或組合錯誤！扣除 10,000 金圓"); render();
        }
    };

    return { init, userAction, modeToggle, handleWin };
})();
window.onload = game.init;
</script>
</body>
</html>
