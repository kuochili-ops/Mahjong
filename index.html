<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { 
            --bg-table: #2e7d32; 
            --gold: #ffd700; 
            --blue-back: #1565c0; 
            --red-frame: #ff0000;
            --tile-w: 36px; /* 放大牌寬 */
        }
        body { 
            background-color: var(--bg-table); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            color: white; 
            overflow: hidden; 
        }
        
        /* 頂部狀態 */
        .status-container { margin-top: 10px; text-align: center; width: 95%; }
        .status-bar { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; border: 1px solid var(--gold); display: inline-block; min-width: 220px; }
        .money-tag { font-size: 0.75rem; color: var(--gold); margin-top: 5px; }

        .mahjong-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            width: 100%; 
            max-width: 500px; 
            padding: 5px; 
            box-sizing: border-box; 
        }

        /* 手牌區：增加滾動條與放大尺寸 */
        .hand-scroll-container {
            width: 100%;
            overflow-x: auto; /* 啟用水平捲動 */
            padding: 15px 0;
            -webkit-overflow-scrolling: touch;
        }
        
        /* 自定義捲動條樣式 */
        .hand-scroll-container::-webkit-scrollbar { height: 6px; }
        .hand-scroll-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        .hand-row { 
            display: inline-flex; /* 讓內容水平展開 */
            justify-content: center; 
            align-items: flex-end; 
            min-height: 70px; 
            gap: 3px; 
            padding: 0 20px;
            min-width: max-content; /* 確保寬度足以容納大牌 */
        }
        
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.1s; position: relative; }
        .tile img { width: 100%; height: auto; display: block; border-radius: 3px; box-shadow: 1px 2px 4px rgba(0,0,0,0.3); }
        .tile.selected { transform: translateY(-18px); filter: brightness(1.2); }
        .draw-gap { margin-left: 15px; }

        .cpu-tile { width: 22px; height: 30px; background-color: var(--blue-back); border: 1px solid #ccc; border-radius: 2px; }

        /* 海底區 */
        .discard-area { 
            background: rgba(0,0,0,0.2); 
            border-radius: 10px; 
            flex: 0.9; 
            margin: 10px 5px; 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            grid-auto-rows: 38px; 
            gap: 5px; 
            padding: 10px; 
            overflow-y: auto; 
        }
        .discard-tile { width: 26px; height: auto; margin: 0 auto; box-sizing: border-box; }
        .discard-tile.taken { border: 2px solid var(--red-frame); box-shadow: 0 0 5px var(--red-frame); }

        /* 功能區 */
        .action-bar { display: flex; justify-content: center; gap: 8px; margin: 5px; }
        .btn { padding: 12px 0; background: linear-gradient(to bottom, #fff, #e0e0e0); border: none; border-radius: 6px; font-weight: bold; font-size: 0.95rem; cursor: pointer; color: #111; flex: 1; box-shadow: 0 4px 0 #888; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #888; }
        .btn.active-mode { background: var(--gold); color: #000; box-shadow: 0 4px 0 #b8860b; }

        .control-panel { width: 100%; display: flex; justify-content: center; padding-bottom: 25px; }
        .btn-main { width: 180px; background: #fff; color: #d32f2f; font-size: 1rem; border: 2px solid #d32f2f; }
    </style>
</head>
<body>

<div class="status-container">
    <div class="status-bar" id="status">𓃥 白六台灣麻將</div>
    <div class="money-tag">白六金圓：底 100,000 / 台 20,000</div>
</div>

<div class="mahjong-area">
    <!-- 對手區 -->
    <div class="hand-row" style="min-height:40px; padding:0; justify-content:center; min-width:auto;">
        <div id="cpuTiles" style="display:flex; gap:2px;"></div>
    </div>

    <!-- 海底丟牌區 -->
    <div class="discard-area" id="discardPile"></div>
    
    <!-- 決策功能鍵 -->
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.modeSelect('chi')">吃牌</button>
        <button id="btn-peng" class="btn" onclick="game.modeSelect('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.modeSelect('gang')">槓</button>
        <button class="btn" onclick="game.handleWin()">胡</button>
    </div>

    <!-- 玩家手牌區（帶有移動捲動條） -->
    <div class="hand-scroll-container">
        <div class="hand-row" id="playerTiles">
            <!-- 牌列會在這裡生成 -->
        </div>
    </div>
</div>

<!-- 核心操作按鈕 -->
<div class="control-panel">
    <button class="btn btn-main" onclick="game.userDraw()">摸牌 / 出牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], discards = [], cpuHandCount = 16;
    let lastDiscardIdx = -1, playerDrawTile = null, currentMode = null, selectedIndices = [];

    const sortTiles = (h) => h.sort((a,b) => {
        const w = {m:0, p:10, s:20, z:30};
        return (parseInt(a[0]) + w[a[1]]) - (parseInt(b[0]) + w[b[1]]);
    });

    const init = () => {
        deck = []; discards = [];
        ['m', 'p', 's'].forEach(t => { for(let i=1; i<=9; i++) for(let j=0; j<4; j++) deck.push(`${i}${t}`); });
        for(let i=1; i<=7; i++) for(let j=0; j<4; j++) deck.push(`${i}z`); 
        for(let i=deck.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        
        playerHand = sortTiles(deck.splice(0, 16));
        cpuHandCount = 16;
        playerDrawTile = null; currentMode = null; selectedIndices = []; lastDiscardIdx = -1;
        updateStatus("遊戲準備就緒，請點擊摸牌");
        render();
    };

    const updateStatus = (msg) => document.getElementById('status').innerText = msg;

    const render = () => {
        // 海底
        const dp = document.getElementById('discardPile');
        dp.innerHTML = discards.map((t, i) => 
            `<img class="discard-tile ${i === lastDiscardIdx ? 'taken' : ''}" src="${svgBase}${t}.svg">`
        ).join('');

        // 手牌渲染
        const pTiles = document.getElementById('playerTiles');
        pTiles.innerHTML = '';
        let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
        all.forEach((t, i) => {
            const div = document.createElement('div');
            const isDraw = playerDrawTile && (i === all.length - 1);
            div.className = `tile ${isDraw ? 'draw-gap' : ''} ${selectedIndices.includes(i) ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => {
                const idx = selectedIndices.indexOf(i);
                if (idx > -1) selectedIndices.splice(idx, 1);
                else selectedIndices.push(i);
                render();
            };
            pTiles.appendChild(div);
        });

        // CPU 蓋牌
        document.getElementById('cpuTiles').innerHTML = Array(cpuHandCount).fill('<div class="cpu-tile"></div>').join('');
        
        // 模式按鈕狀態
        ['chi', 'peng', 'gang'].forEach(m => {
            document.getElementById(`btn-${m}`).classList.toggle('active-mode', currentMode === m);
        });
    };

    const cpuTurn = () => {
        updateStatus("對手摸牌中...");
        setTimeout(() => {
            if(deck.length === 0) return alert("流局");
            const d = deck.pop();
            discards.push(d);
            lastDiscardIdx = -1;
            updateStatus(`對手打出 ${d}`);
            render();
        }, 1000);
    };

    const modeSelect = (mode) => {
        if (currentMode === mode) executeAction(mode);
        else {
            currentMode = mode;
            updateStatus(`請選牌並再按一次「${mode === 'chi' ? '吃牌' : mode === 'peng' ? '碰' : '槓'}」`);
            render();
        }
    };

    const executeAction = (type) => {
        let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
        const selectedTiles = selectedIndices.map(i => all[i]);
        const lastD = discards[discards.length - 1];
        let valid = false;

        if (type === 'peng' && selectedIndices.length === 2 && selectedTiles.every(t => t === lastD)) valid = true;
        else if (type === 'chi' && selectedIndices.length === 2) {
            const combined = [...selectedTiles, lastD];
            const vals = combined.filter(t => t[1] === lastD[1]).map(t => parseInt(t[0])).sort();
            if (vals.length === 3 && vals[2]-vals[1]===1 && vals[1]-vals[0]===1) valid = true;
        } else if (type === 'gang') {
            if (selectedIndices.length === 3 && selectedTiles.every(t => t === lastD)) valid = true;
            else if (selectedIndices.length === 4 && selectedTiles.every(t => t === selectedTiles[0])) valid = true;
        }

        if (valid) {
            lastDiscardIdx = discards.length - 1; // 顯示紅框
            playerHand.push(discards[discards.length-1]);
            selectedIndices.sort((a,b) => b-a).forEach(idx => {}); // 僅標記不移除，模擬插入手牌
            playerHand = sortTiles(playerHand);
            playerDrawTile = null; selectedIndices = []; currentMode = null;
            updateStatus("動作完成，請打出一張牌");
            render();
        } else {
            updateStatus("組合無效，請重選");
            selectedIndices = []; render();
        }
    };

    const userDraw = () => {
        if (selectedIndices.length === 1) {
            let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
            let disc = all.splice(selectedIndices[0], 1)[0];
            discards.push(disc);
            lastDiscardIdx = -1;
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = [];
            cpuTurn();
        } else if (!playerDrawTile) {
            if(deck.length === 0) return alert("流局");
            playerDrawTile = deck.pop();
            updateStatus("已摸牌，請選一張捨棄");
            render();
        }
    };

    return { init, modeSelect, userDraw, handleWin: () => alert("𓃥 胡牌！結算白六金圓！") };
})();

window.onload = game.init;
</script>
</body>
</html>
