<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { 
            --bg-table: #2e7d32; --gold: #ffd700; --blue-back: #1565c0; --red-frame: #ff0000;
            --tile-w: 36px; --meld-tile-w: 28px;
        }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: sans-serif; color: white; overflow: hidden; }
        .status-container { margin-top: 10px; text-align: center; width: 95%; }
        .status-bar { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; border: 1px solid var(--gold); display: inline-block; min-width: 220px; }
        .money-tag { font-size: 0.85rem; color: var(--gold); margin-top: 5px; font-weight: bold; }
        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; padding: 5px; box-sizing: border-box; }
        .hand-scroll-container { width: 100%; overflow-x: auto; padding: 15px 0; -webkit-overflow-scrolling: touch; }
        .hand-row { display: inline-flex; align-items: flex-end; min-height: 75px; gap: 4px; padding: 0 15px; min-width: max-content; }
        .meld-zone { display: flex; gap: 8px; margin-right: 12px; border-right: 1px solid rgba(255,255,255,0.3); padding-right: 12px; }
        .meld-group { display: flex; gap: 1px; background: rgba(255,255,255,0.1); padding: 2px; border-radius: 3px; }
        .meld-tile { width: var(--meld-tile-w); }
        .meld-tile img { width: 100%; display: block; }
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.1s; position: relative; }
        .tile img { width: 100%; display: block; border-radius: 3px; box-shadow: 1px 2px 4px rgba(0,0,0,0.3); }
        .tile.selected { transform: translateY(-18px); filter: brightness(1.2); }
        .draw-gap { margin-left: 15px; }
        .cpu-tile { width: 22px; height: 30px; background-color: var(--blue-back); border: 1px solid #ccc; border-radius: 2px; }
        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; flex: 1; margin: 10px 5px; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 38px; gap: 5px; padding: 10px; overflow-y: auto; }
        .discard-tile { width: 26px; height: auto; margin: 0 auto; box-sizing: border-box; }
        .discard-tile.taken { border: 2px solid var(--red-frame); box-shadow: 0 0 5px var(--red-frame); }
        .action-bar { display: flex; justify-content: center; gap: 8px; margin: 5px; }
        .btn { padding: 12px 0; background: linear-gradient(to bottom, #fff, #e0e0e0); border: none; border-radius: 6px; font-weight: bold; font-size: 0.95rem; cursor: pointer; color: #111; flex: 1; box-shadow: 0 4px 0 #888; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #888; }
        .btn.active-mode { background: var(--gold); color: #000; box-shadow: 0 4px 0 #b8860b; }
        .control-panel { width: 100%; display: flex; justify-content: center; padding-bottom: 25px; }
        .btn-main { width: 180px; background: #fff; color: #d32f2f; font-size: 1rem; border: 2px solid #d32f2f; }
    </style>
</head>
<body>
<div class="status-container">
    <div class="status-bar" id="status">𓃥 白六台灣麻將</div>
    <div class="money-tag" id="totalGold">持有金圓：1,000,000</div>
</div>
<div class="mahjong-area">
    <div class="hand-row" style="min-height:40px; justify-content:center; min-width:auto;">
        <div id="cpuMelds" class="meld-zone"></div>
        <div id="cpuTiles" style="display:flex; gap:2px;"></div>
    </div>
    <div class="discard-area" id="discardPile"></div>
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.modeSelect('chi')">吃牌</button>
        <button id="btn-peng" class="btn" onclick="game.modeSelect('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.modeSelect('gang')">槓</button>
        <button class="btn" onclick="game.handleWin()">胡</button>
    </div>
    <div class="hand-scroll-container">
        <div class="hand-row">
            <div id="playerMelds" class="meld-zone"></div>
            <div id="playerTiles" style="display:flex; gap:3px; align-items:flex-end;"></div>
        </div>
    </div>
</div>
<div class="control-panel">
    <button class="btn btn-main" onclick="game.userDraw()">摸牌 / 出牌</button>
</div>
<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], cpuHand = [], cpuMelds = [], discards = [];
    let lastDiscardIdx = -1, playerDrawTile = null, currentMode = null, selectedIndices = [];
    let isWaitingForDiscard = false;
    let totalBalance = parseInt(localStorage.getItem('white6_gold')) || 1000000;

    const sortTiles = (h) => h.sort((a,b) => {
        const w = {m:0, p:10, s:20, z:30};
        return (parseInt(a[0]) + w[a[1]]) - (parseInt(b[0]) + w[b[1]]);
    });

    const init = () => {
        deck = []; discards = []; playerMelds = []; cpuMelds = [];
        ['m', 'p', 's'].forEach(t => { for(let i=1; i<=9; i++) for(let j=0; j<4; j++) deck.push(`${i}${t}`); });
        for(let i=1; i<=7; i++) for(let j=0; j<4; j++) deck.push(`${i}z`); 
        for(let i=deck.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0, 16));
        cpuHand = deck.splice(0, 16);
        playerDrawTile = null; currentMode = null; selectedIndices = []; lastDiscardIdx = -1;
        isWaitingForDiscard = false;
        document.getElementById('totalGold').innerText = `持有金圓：${totalBalance.toLocaleString()}`;
        render();
    };

    // 核心判定邏輯：16張麻將胡牌演算法
    const checkWin = (hand) => {
        if (hand.length % 3 !== 2) return false;
        const counts = {};
        hand.forEach(t => counts[t] = (counts[t] || 0) + 1);
        
        const tiles = Object.keys(counts).sort();
        for (let t of tiles) {
            if (counts[t] >= 2) {
                const copy = {...counts};
                copy[t] -= 2;
                if (canSplit(copy)) return true;
            }
        }
        return false;
    };

    const canSplit = (counts) => {
        const tiles = Object.keys(counts).filter(k => counts[k] > 0).sort();
        if (tiles.length === 0) return true;
        
        const t = tiles[0];
        // 刻子
        if (counts[t] >= 3) {
            counts[t] -= 3;
            if (canSplit(counts)) return true;
            counts[t] += 3;
        }
        // 順子 (排除字牌z)
        if (t.includes('m') || t.includes('p') || t.includes('s')) {
            const n = parseInt(t[0]);
            const suit = t[1];
            const t2 = (n+1) + suit, t3 = (n+2) + suit;
            if (counts[t2] > 0 && counts[t3] > 0) {
                counts[t]--; counts[t2]--; counts[t3]--;
                if (canSplit(counts)) return true;
                counts[t]++; counts[t2]++; counts[t3]++;
            }
        }
        return false;
    };

    const handleWin = () => {
        const all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
        if (checkWin(all)) {
            const win = 100000 + (3 * 20000);
            totalBalance += win;
            localStorage.setItem('white6_gold', totalBalance);
            alert(`𓃥 恭喜胡牌！贏得 ${win.toLocaleString()} 金圓`);
            init();
        } else {
            alert("尚未符合胡牌牌型，不能詐胡喔！");
        }
    };

    const render = () => {
        const dp = document.getElementById('discardPile');
        dp.innerHTML = discards.map((t, i) => `<img class="discard-tile ${i === lastDiscardIdx ? 'taken' : ''}" src="${svgBase}${t}.svg">`).join('');
        document.getElementById('cpuMelds').innerHTML = cpuMelds.map(g => `<div class="meld-group">${g.map(t => `<div class="meld-tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>`).join('');
        document.getElementById('playerMelds').innerHTML = playerMelds.map(g => `<div class="meld-group">${g.map(t => `<div class="meld-tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>`).join('');
        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
        all.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${playerDrawTile && i === all.length-1 ? 'draw-gap' : ''} ${selectedIndices.includes(i) ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => {
                const idx = selectedIndices.indexOf(i);
                if (idx > -1) selectedIndices.splice(idx, 1); else selectedIndices.push(i);
                render();
            };
            pt.appendChild(div);
        });
        document.getElementById('cpuTiles').innerHTML = Array(cpuHand.length).fill('<div class="cpu-tile"></div>').join('');
    };

    const userDraw = () => {
        if(selectedIndices.length === 1) {
            let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
            discards.push(all.splice(selectedIndices[0], 1)[0]);
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = [];
            isWaitingForDiscard = false; lastDiscardIdx = -1;
            setTimeout(() => { cpuHand.push(deck.pop()); discards.push(cpuHand.splice(0,1)[0]); render(); }, 800);
        } else if(!playerDrawTile && !isWaitingForDiscard) {
            playerDrawTile = deck.pop(); render();
        }
    };

    const modeSelect = (m) => {
        if(isWaitingForDiscard) return;
        if(currentMode === m) execute(m); else { currentMode = m; render(); }
    };

    const execute = (type) => {
        let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
        const lastD = discards[discards.length - 1];
        let valid = false, group = [];
        if(type === 'peng' && selectedIndices.length === 2 && all[selectedIndices[0]] === lastD) { group = [lastD, lastD, lastD]; valid = true; }
        else if(type === 'chi' && selectedIndices.length === 2) { 
            const s = sortTiles(selectedIndices.map(i => all[i])); group = [s[0], lastD, s[1]]; valid = true; 
        }
        if(valid) {
            playerMelds.push(group);
            selectedIndices.sort((a,b)=>b-a).forEach(i => all.splice(i, 1));
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = []; currentMode = null; isWaitingForDiscard = true; render();
        }
    };

    return { init, userDraw, handleWin, modeSelect };
})();
window.onload = game.init;
</script>
</body>
</html>
