<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>White 6 台灣麻將 - 吃牌功能完整版</title>
    <style>
        :root {
            --bg-table: #2e7d32;
            --back-w: 20px;
            --back-h: 28px;
            --blue-back: #1565c0;
            --tile-gap: 1px;
        }

        body {
            background-color: var(--bg-table);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        .status-bar {
            margin-top: 10px;
            background: rgba(0,0,0,0.6);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            min-height: 24px;
            display: flex;
            align-items: center;
            text-align: center;
        }

        .mahjong-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            max-width: 380px;
            padding: 10px 5px;
            box-sizing: border-box;
        }

        .hand {
            display: flex;
            justify-content: center;
            gap: var(--tile-gap);
            min-height: 55px;
            align-items: flex-end;
        }

        .melds { display: flex; gap: 4px; margin-right: 5px; }
        .meld-group { display: flex; gap: 0px; border: 1px solid rgba(255,255,255,0.3); padding: 1px; border-radius: 2px; }

        .tile {
            width: 21px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s;
            margin: 0 -0.5px;
        }

        .tile img { width: 100%; height: auto; display: block; }
        .tile.selected { transform: translateY(-12px); }

        .cpu-tile {
            width: var(--back-w);
            height: var(--back-h);
            background-color: var(--blue-back);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2px;
        }

        .discard-area {
            background: rgba(0,0,0,0.08);
            border-radius: 10px;
            flex: 1;
            margin: 10px 0;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-auto-rows: 32px;
            gap: 2px;
            padding: 8px;
            overflow-y: auto;
        }

        .discard-tile { width: 22px; height: auto; margin: 0 auto; opacity: 0.9; }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 4px;
            background: linear-gradient(to bottom, #fff, #e0e0e0);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            color: #333;
            flex: 1;
            box-shadow: 0 2px 0 #999;
        }

        .btn:disabled { opacity: 0.3; pointer-events: none; }
        .btn-reset { background: #fff; margin-bottom: 15px; width: 120px; flex: none; }
        
        .draw-gap { margin-left: 8px; }
    </style>
</head>
<body>

<div class="status-bar" id="status">準備開局...</div>

<div class="mahjong-area">
    <div class="hand" id="cpuHand"></div>
    <div class="discard-area" id="discardPile"></div>
    
    <div class="action-bar">
        <button class="btn" id="btn-draw" onclick="game.action('drawOrDiscard')">摸入/捨去</button>
        <button class="btn" id="btn-chi" onclick="game.action('chi')" disabled>吃牌</button>
        <button class="btn" id="btn-peng" onclick="game.action('peng')" disabled>碰</button>
        <button class="btn" id="btn-gang" onclick="game.action('gang')" disabled>槓</button>
        <button class="btn" id="btn-win" onclick="game.action('win')" disabled>胡</button>
    </div>

    <div class="hand" id="playerHand">
        <div id="melds" class="melds"></div>
        <div id="handTiles" class="hand" style="min-height:auto;"></div>
    </div>
</div>

<button class="btn btn-reset" onclick="game.init()">重新開局</button>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], lastDiscard = null, drawTile = null;
    let selectedIndex = -1;
    let possibleChiGroups = [];

    const sortTiles = (h) => h.sort((a,b) => {
        const w = {m:0, p:10, s:20, z:30};
        return (parseInt(a[0]) + w[a[1]]) - (parseInt(b[0]) + w[b[1]]);
    });

    const init = () => {
        deck = [];
        ['m', 'p', 's'].forEach(t => { for(let i=1; i<=9; i++) for(let j=0; j<4; j++) deck.push(`${i}${t}`); });
        for(let i=1; i<=7; i++) for(let j=0; j<4; j++) deck.push(`${i}z`); 
        for(let i=deck.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        
        playerHand = sortTiles(deck.splice(0, 16));
        playerMelds = [];
        drawTile = deck.pop();
        lastDiscard = null;
        selectedIndex = -1;
        document.getElementById('discardPile').innerHTML = '';
        updateStatus("遊戲開始，請選一張牌打出");
        render();
    };

    const updateStatus = (msg) => document.getElementById('status').innerText = msg;

    const checkActions = (tile) => {
        if(!tile) return;
        const count = playerHand.filter(t => t === tile).length;
        document.getElementById('btn-peng').disabled = count < 2;
        document.getElementById('btn-gang').disabled = count < 3;
        
        // 吃牌邏輯：上家打出的牌與手牌組成順子
        possibleChiGroups = [];
        const type = tile[1];
        if(type !== 'z') {
            const val = parseInt(tile[0]);
            const has = (v) => playerHand.includes(v + type);
            // 三種吃法：[val-2, val-1, val], [val-1, val, val+1], [val, val+1, val+2]
            if(val >= 3 && has(val-2) && has(val-1)) possibleChiGroups.push([ (val-2)+type, (val-1)+type, tile ]);
            if(val >= 2 && val <= 8 && has(val-1) && has(val+1)) possibleChiGroups.push([ (val-1)+type, tile, (val+1)+type ]);
            if(val <= 7 && has(val+1) && has(val+2)) possibleChiGroups.push([ tile, (val+1)+type, (val+2)+type ]);
        }
        document.getElementById('btn-chi').disabled = possibleChiGroups.length === 0;
    };

    const render = () => {
        const hContainer = document.getElementById('handTiles');
        const mContainer = document.getElementById('melds');
        const cContainer = document.getElementById('cpuHand');

        mContainer.innerHTML = playerMelds.map(m => `
            <div class="meld-group">${m.map(t => `<div class="tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>
        `).join('');

        hContainer.innerHTML = '';
        let currentFullHand = [...playerHand];
        if(drawTile) currentFullHand.push(drawTile);

        currentFullHand.forEach((t, i) => {
            const div = document.createElement('div');
            const isDraw = drawTile && (i === currentFullHand.length - 1);
            div.className = `tile ${isDraw ? 'draw-gap' : ''} ${selectedIndex === i ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => { selectedIndex = (selectedIndex === i) ? -1 : i; render(); };
            hContainer.appendChild(div);
        });

        cContainer.innerHTML = Array(16).fill('<div class="cpu-tile"></div>').join('');
    };

    const cpuPlay = () => {
        setTimeout(() => {
            lastDiscard = deck.pop(); 
            document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${lastDiscard}.svg">`;
            updateStatus(`對方打出 ${lastDiscard}，請操作`);
            checkActions(lastDiscard);
            render();
        }, 800);
    };

    const action = (type) => {
        if (type === 'drawOrDiscard') {
            if (selectedIndex === -1) {
                if (!drawTile) {
                    drawTile = deck.pop();
                    updateStatus("已摸牌，請選一張捨去");
                    render();
                } else { updateStatus("請先選一張牌打出"); }
                return;
            }
            let all = [...playerHand];
            if(drawTile) all.push(drawTile);
            let disc = all.splice(selectedIndex, 1)[0];
            document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${disc}.svg">`;
            playerHand = sortTiles(all);
            drawTile = null;
            selectedIndex = -1;
            updateStatus("等待對方出牌...");
            document.getElementById('btn-chi').disabled = true;
            document.getElementById('btn-peng').disabled = true;
            render();
            cpuPlay();
        } else if (type === 'chi') {
            // 執行吃牌：預設取第一組符合的吃法
            const group = possibleChiGroups[0];
            playerMelds.push(group);
            group.forEach(t => {
                if(t !== lastDiscard) playerHand.splice(playerHand.indexOf(t), 1);
            });
            drawTile = null; 
            selectedIndex = -1;
            document.getElementById('btn-chi').disabled = true;
            updateStatus("吃！請選一張牌打出");
            render();
        } else if (type === 'peng') {
            playerMelds.push([lastDiscard, lastDiscard, lastDiscard]);
            for(let i=0; i<2; i++) playerHand.splice(playerHand.indexOf(lastDiscard), 1);
            drawTile = null;
            selectedIndex = -1;
            document.getElementById('btn-peng').disabled = true;
            updateStatus("碰！請選一張牌打出");
            render();
        }
    };

    return { init, action };
})();

window.onload = game.init;
</script>
</body>
</html>
