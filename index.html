<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 34px; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; font-family: sans-serif; color: white; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        
        .status-bar { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); margin: 8px 0; z-index: 20; }
        
        /* 對手空間預留 */
        .opp-zone { width: 100%; display: flex; flex-direction: column; align-items: center; min-height: 100px; padding: 5px 0; gap: 8px; background: rgba(0,0,0,0.1); }
        .opp-row { display: flex; gap: 4px; justify-content: center; min-height: 40px; }
        
        .discard-area { flex: 1; width: 95%; max-width: 420px; background: rgba(0,0,0,0.1); border-radius: 12px; margin: 5px 0; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 30px; gap: 3px; padding: 10px; overflow-y: auto; }
        .discard-tile { width: 24px; margin: 0 auto; }
        
        .action-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; width: 90%; }
        .btn-opt { padding: 12px 0; background: #eee; border: none; border-radius: 8px; font-weight: bold; flex: 1; color: #333; font-size: 0.95rem; box-shadow: 0 3px 0 #bbb; }

        /* 玩家手牌區：強化滾動體驗 */
        .player-zone { width: 100%; background: rgba(0,0,0,0.2); padding: 15px 0; position: relative; }
        .scroll-hint { position: absolute; left: 10px; top: 2px; font-size: 0.7rem; color: var(--gold); opacity: 0.7; }
        .hand-scroll-container { width: 100%; overflow-x: auto; padding: 0 25px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .hand-row { display: flex; align-items: flex-end; min-height: 65px; gap: 4px; width: max-content; }
        
        .tile { width: var(--tile-w); transition: transform 0.2s; }
        .tile img { width: 100%; border-radius: 4px; display: block; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .tile.selected img { outline: 3px solid var(--gold); transform: translateY(-15px); }
        .draw-gap { margin-left: 18px; position: relative; }
        .draw-gap::before { content: ""; position: absolute; left: -10px; top: 10%; height: 80%; width: 1px; background: rgba(255,255,255,0.3); }
        
        .tile-sm { width: 26px; }
        .meld-group { display: flex; gap: 1px; background: rgba(255,255,255,0.1); padding: 3px; border-radius: 4px; }

        /* 動態動作主按鈕 */
        .control-panel { width: 100%; display: flex; justify-content: center; padding: 15px 0 45px 0; }
        .btn-main { width: 90%; height: 60px; background: #fff; color: #d32f2f; font-size: 1.4rem; border: none; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 0 #bbb; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #bbb; }
        .btn-main.waiting { background: #f0f0f0; color: #888; }
    </style>
</head>
<body>

<div class="status-bar">
    𓃥 白六 | <span id="totalGold">1,800,000</span> 金圓 | 剩餘: <span id="deckCount">0</span> 張
</div>

<div class="opp-zone">
    <div id="oppMelds" class="opp-row"></div>
    <div id="oppWinHand" class="opp-row"></div>
</div>

<div id="discardPile" class="discard-area"></div>

<div class="action-bar">
    <button class="btn-opt" onclick="game.modeAction('chi')">吃</button>
    <button class="btn-opt" onclick="game.modeAction('peng')">碰</button>
    <button class="btn-opt" onclick="game.modeAction('gang')">槓</button>
    <button class="btn-opt" style="background:#ff9800; color:white;" onclick="game.handleWin(true)">胡</button>
</div>

<div class="player-zone">
    <div class="scroll-hint">◀ 副露組合</div>
    <div id="scrollContainer" class="hand-scroll-container">
        <div class="hand-row" id="playerTiles"></div>
    </div>
</div>

<div class="control-panel">
    <button id="btn-main-action" class="btn-main" onclick="game.userStep()">摸牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], discards = [], oppHand = [], oppMelds = [];
    let playerDrawTile = null, selectedIdx = null;

    const sortTiles = (h) => [...h].sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        return (parseInt(a) + order[a.slice(-1)]) - (parseInt(b) + order[b.slice(-1)]);
    });

    const init = () => {
        deck = []; discards = []; oppMelds = []; oppHand = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0, 16));
        oppHand = deck.splice(0, 16);
        render();
    };

    const render = (showOpp = false) => {
        document.getElementById('deckCount').innerText = deck.length;
        
        // 對手區
        document.getElementById('oppMelds').innerHTML = oppMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        document.getElementById('oppWinHand').innerHTML = showOpp ? oppHand.map(t => `<img class="tile-sm" src="${svgBase}${t}.svg">`).join('') : "";

        // 棄牌區
        const dp = document.getElementById('discardPile');
        dp.innerHTML = discards.map(t => `<img class="discard-tile" src="${svgBase}${t}.svg">`).join('');
        dp.scrollTop = dp.scrollHeight;

        // 玩家手牌與新牌
        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${selectedIdx === i ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => { selectedIdx = i; render(); };
            pt.appendChild(div);
        });

        if (playerDrawTile) {
            const div = document.createElement('div');
            div.className = `tile draw-gap ${selectedIdx === 99 ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`;
            div.onclick = () => { selectedIdx = 99; render(); };
            pt.appendChild(div);
        }

        // 動作按鍵依狀態更新
        const mainBtn = document.getElementById('btn-main-action');
        if (playerDrawTile) {
            mainBtn.innerText = "請選擇放牌";
            mainBtn.classList.remove('waiting');
        } else {
            mainBtn.innerText = "摸牌";
            mainBtn.classList.remove('waiting');
        }
    };

    const userStep = () => {
        const sc = document.getElementById('scrollContainer');
        
        if (!playerDrawTile) {
            // 摸牌階段
            playerDrawTile = deck.pop();
            selectedIdx = 99; // 摸牌後自動選中新牌
            render();
            // 強制滾動到最右側，確保新牌可見
            setTimeout(() => { sc.scrollLeft = sc.scrollWidth; }, 50);
        } else if (selectedIdx !== null) {
            // 出牌階段
            const discarded = (selectedIdx === 99) ? playerDrawTile : playerHand.splice(selectedIdx, 1)[0];
            discards.push(discarded);
            playerHand = sortTiles(playerHand);
            playerDrawTile = null;
            selectedIdx = null;
            render();
            
            // 模擬對手動作
            setTimeout(() => {
                if (deck.length > 0) {
                    const oppDraw = deck.pop();
                    if (Math.random() < 0.05) { handleWin(false); } // 對手隨機胡牌
                    else { discards.push(oppDraw); render(); }
                }
            }, 600);
        }
    };

    const handleWin = (isPlayer) => {
        render(!isPlayer); // 優先顯示完整牌組
        setTimeout(() => {
            alert(isPlayer ? "恭喜自摸！" : "對手胡牌！");
            init();
        }, 500);
    };

    return { init, userStep, handleWin, modeAction: (m)=>{} };
})();

window.onload = game.init;
</script>
</body>
</html>
