<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 32px; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; font-family: sans-serif; color: white; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .status-bar { background: rgba(0,0,0,0.8); padding: 4px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); margin-top: 10px; display: flex; align-items: center; gap: 8px; z-index: 10; }
        .opp-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px 0; min-height: 120px; background: rgba(0,0,0,0.4); border-bottom: 2px solid rgba(255,255,255,0.1); }
        .opp-rows { display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; }
        .meld-group { display: flex; gap: 1px; background: rgba(255,255,255,0.1); padding: 2px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); }
        .tile-sm { width: 22px; border-radius: 2px; }
        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; padding: 5px; box-sizing: border-box; }
        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; height: 110px; margin: 5px; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 32px; gap: 4px; padding: 10px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .discard-tile { width: 26px; margin: 0 auto; }
        .discard-tile.last { border: 2px solid var(--gold); box-shadow: 0 0 8px var(--gold); }
        .hand-scroll-container { width: 100%; overflow-x: auto; padding: 10px 0; scroll-behavior: smooth; }
        .player-hand-stack { display: flex; flex-direction: column; gap: 8px; padding: 0 25px; min-width: max-content; }
        .meld-zone { display: flex; gap: 8px; min-height: 30px; }
        .hand-row { display: flex; align-items: flex-end; min-height: 60px; gap: 3px; }
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.1s; }
        .tile img { width: 100%; border-radius: 3px; display: block; }
        .tile.selected { transform: translateY(-12px); outline: 2px solid var(--gold); }
        .draw-gap { margin-left: 15px; border-left: 2px solid rgba(255,255,255,0.3); padding-left: 8px; }
        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 95%; }
        .btn { padding: 12px 0; background: #e0e0e0; border: none; border-radius: 8px; font-weight: bold; flex: 1; color: #333; font-size: 0.9rem; }
        .btn.active-mode { background: var(--gold) !important; color: #000; }
        .control-panel { width: 100%; display: center; justify-content: center; padding: 10px 0 40px 0; background: rgba(0,0,0,0.2); }
        .btn-main { width: 90%; height: 55px; background: #fff; color: #d32f2f; font-size: 1.3rem; border: none; border-radius: 12px; font-weight: bold; }
        #msg-overlay { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); padding: 15px 30px; border-radius: 50px; border: 2px solid var(--gold); display: none; z-index: 100; font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>

<div id="msg-overlay"></div>
<div class="status-bar">𓃥 白六 | <span id="totalGold">1,800,000</span> 金圓 | 剩餘: <span id="deckCount">0</span> 張</div>
<div class="opp-area">
    <div class="opp-rows">
        <div id="oppMelds" style="display:flex; gap:8px; min-height:30px;"></div>
        <div id="oppHandReveal" style="display:flex; gap:2px; min-height:30px;"></div>
    </div>
</div>
<div class="mahjong-area">
    <div id="discardPile" class="discard-area"></div>
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.modeToggle('chi')">吃</button>
        <button id="btn-peng" class="btn" onclick="game.modeToggle('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.modeToggle('gang')">槓</button>
        <button id="btn-win" class="btn" style="background:var(--gold)" onclick="game.checkPlayerWin()">胡</button>
    </div>
    <div class="hand-scroll-container">
        <div class="player-hand-stack">
            <div id="playerMelds" class="meld-zone"></div>
            <div class="hand-row">
                <div id="playerTiles" style="display:flex; gap:3px;"></div>
                <div id="newDrawTileContainer"></div>
            </div>
        </div>
    </div>
</div>
<div class="control-panel"><button id="btn-main-action" class="btn-main" onclick="game.userAction()">摸牌</button></div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], oppHand = [], oppMelds = [], discards = [];
    let playerDrawTile = null, selectedIndices = [], activeMode = null, totalGold = 1800000, isWaitingForDiscard = false;

    const sortTiles = (h) => [...h].sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        return (parseInt(a) + order[a.slice(-1)]) - (parseInt(b) + order[b.slice(-1)]);
    });

    // --- 核心邏輯：胡牌規則判定 ---
    const isMahjong = (hand) => {
        const counts = {};
        hand.forEach(t => counts[t] = (counts[t] || 0) + 1);
        const tiles = Object.keys(counts).sort();
        
        for (let t of tiles) {
            if (counts[t] >= 2) {
                const nextHand = [...hand];
                nextHand.splice(nextHand.indexOf(t), 1);
                nextHand.splice(nextHand.indexOf(t), 1);
                if (checkSets(nextHand)) return true;
            }
        }
        return false;
    };

    const checkSets = (hand) => {
        if (hand.length === 0) return true;
        const h = sortTiles(hand);
        const first = h[0];
        // 刻子
        if (h.filter(x => x === first).length >= 3) {
            const next = [...h];
            for(let i=0; i<3; i++) next.splice(next.indexOf(first), 1);
            if (checkSets(next)) return true;
        }
        // 順子
        const val = parseInt(first), suit = first.slice(-1);
        if (suit !== 'z') {
            const t2 = `${val+1}${suit}`, t3 = `${val+2}${suit}`;
            if (h.includes(t2) && h.includes(t3)) {
                const next = [...h];
                next.splice(next.indexOf(first), 1);
                next.splice(next.indexOf(t2), 1);
                next.splice(next.indexOf(t3), 1);
                if (checkSets(next)) return true;
            }
        }
        return false;
    };

    const init = () => {
        deck = []; discards = []; playerMelds = []; oppMelds = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0,16)); oppHand = deck.splice(0,16);
        playerDrawTile = null; selectedIndices = []; activeMode = null; isWaitingForDiscard = false;
        document.getElementById('oppHandReveal').innerHTML = '';
        render();
    };

    const render = () => {
        document.getElementById('deckCount').innerText = deck.length;
        document.getElementById('totalGold').innerText = totalGold.toLocaleString();
        const dp = document.getElementById('discardPile');
        dp.innerHTML = discards.map((t,idx) => `<img class="discard-tile ${idx===discards.length-1?'last':''}" src="${svgBase}${t}.svg">`).join('');
        dp.scrollTop = dp.scrollHeight;

        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${selectedIndices.includes(i)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`; 
            div.onclick = () => toggleSelect(i); pt.appendChild(div);
        });

        const drawContainer = document.getElementById('newDrawTileContainer');
        drawContainer.innerHTML = '';
        if(playerDrawTile) {
            const div = document.createElement('div');
            div.id = "activeNewTile";
            div.className = `tile draw-gap ${selectedIndices.includes(playerHand.length)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`;
            div.onclick = () => toggleSelect(playerHand.length);
            drawContainer.appendChild(div);
        }

        document.getElementById('playerMelds').innerHTML = playerMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        document.getElementById('oppMelds').innerHTML = oppMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        
        document.getElementById('btn-main-action').innerText = (playerDrawTile || isWaitingForDiscard) ? "選擇放牌" : (activeMode ? "確認組合" : "摸牌");
    };

    const userAction = () => {
        if (activeMode) {
            const target = (activeMode === 'chi' || activeMode === 'peng') ? 2 : 3;
            if (selectedIndices.length !== target) return;
            const lastD = discards.pop();
            const picked = selectedIndices.map(idx => (idx === playerHand.length) ? playerDrawTile : playerHand[idx]);
            playerHand = playerHand.filter((_, idx) => !selectedIndices.includes(idx));
            playerMelds.push(sortTiles([...picked, lastD]));
            isWaitingForDiscard = true; activeMode = null; selectedIndices = []; render(); return;
        }
        if (!playerDrawTile && !isWaitingForDiscard) { 
            playerDrawTile = deck.pop(); render(); 
            return; 
        }
        if (selectedIndices.length === 1) {
            let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
            const discarded = all.splice(selectedIndices[0], 1)[0];
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = []; isWaitingForDiscard = false;
            discards.push(discarded); render();
            setTimeout(() => opponentAI(discarded), 600);
        }
    };

    const opponentAI = (lastD) => {
        // 1. 檢測胡牌 (放槍)
        if (isMahjong([...oppHand, lastD])) { handleWin(false, "放槍"); return; }
        
        // 2. 檢測碰/槓
        const count = oppHand.filter(t => t === lastD).length;
        if (count >= 2) {
            discards.pop();
            oppMelds.push(new Array(3).fill(lastD));
            oppHand = oppHand.filter(t => t !== lastD);
            render(); setTimeout(oppDiscard, 600); return;
        }

        // 3. 摸牌並檢測胡牌 (自摸)
        const drawn = deck.pop();
        if (isMahjong([...oppHand, drawn])) { oppHand.push(drawn); handleWin(false, "自摸"); return; }
        oppHand.push(drawn);
        oppDiscard();
    };

    const oppDiscard = () => {
        discards.push(oppHand.splice(Math.floor(Math.random()*oppHand.length), 1)[0]);
        render();
    };

    const checkPlayerWin = () => {
        let fullHand = [...playerHand];
        if (playerDrawTile) fullHand.push(playerDrawTile);
        if (isMahjong(fullHand)) handleWin(true, playerDrawTile ? "自摸" : "榮和");
        else alert("尚未胡牌，請檢查牌型！");
    };

    const handleWin = (isP, type) => {
        const sortedOpp = sortTiles(oppHand);
        document.getElementById('oppHandReveal').innerHTML = sortedOpp.map(t => `<img class="tile-sm" src="${svgBase}${t}.svg">`).join('');
        const score = isP ? 50000 : -50000;
        totalGold += score;
        setTimeout(() => {
            alert(`${isP?'恭喜':'對手'}胡牌！\n形式：${type}\n金額：${Math.abs(score).toLocaleString()} 金圓`);
            init();
        }, 500);
    };

    const toggleSelect = (i) => {
        if (activeMode) {
            const target = (activeMode === 'chi' || activeMode === 'peng') ? 2 : 3;
            if (selectedIndices.includes(i)) selectedIndices = selectedIndices.filter(x => x !== i);
            else if (selectedIndices.length < target) selectedIndices.push(i);
        } else { selectedIndices = [i]; }
        render();
    };

    const modeToggle = (m) => { activeMode = (activeMode === m) ? null : m; selectedIndices = []; render(); };

    return { init, userAction, modeToggle, checkPlayerWin };
})();
window.onload = game.init;
</script>
</body>
</html>
