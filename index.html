<script>
// ... (保留之前的 svgBase, deck, playerHand 等變數)

    const opponentAI = (lastD) => {
        // 1. 先判斷是否胡牌 (榮和)
        if (isMahjong([...oppHand, lastD])) { handleWin(false, false); return; }
        
        // 2. 判斷碰/槓 (優先級高)
        const count = oppHand.filter(x => x === lastD).length;
        if (count >= 2) {
            for(let i=0; i<count; i++) oppHand.splice(oppHand.indexOf(lastD), 1);
            oppMelds.push(new Array(count + 1).fill(lastD));
            discards.pop(); 
            aiDiscard(); return;
        }

        // 3. 判斷吃牌 (AI 只有在上家（玩家）丟牌時能吃)
        const v = parseInt(lastD), s = lastD.slice(-1);
        if (s !== 'z') { // 字牌不能吃
            const has = (n) => oppHand.includes(`${n}${s}`);
            let combo = null;
            // AI 簡單吃牌邏輯：偵測三種組合
            if (has(v-2) && has(v-1)) combo = [`${v-2}${s}`, `${v-1}${s}`];
            else if (has(v-1) && has(v+1)) combo = [`${v-1}${s}`, `${v+1}${s}`];
            else if (has(v+1) && has(v+2)) combo = [`${v+1}${s}`, `${v+2}${s}`];

            // 隨機決定是否吃牌 (增加真實感，不一定每把都吃)
            if (combo && Math.random() > 0.4) {
                combo.forEach(t => oppHand.splice(oppHand.indexOf(t), 1));
                oppMelds.push(sortTiles([...combo, lastD]));
                discards.pop();
                aiDiscard(); return;
            }
        }

        // 4. 一般摸牌流程
        const drawn = deck.pop();
        if (isMahjong([...oppHand, drawn])) { oppHand.push(drawn); handleWin(false, true); return; }
        oppHand.push(drawn);
        aiDiscard();
    };

    const aiDiscard = () => {
        // AI 捨牌：優先丟掉單張的大字，然後隨機
        oppHand = sortTiles(oppHand);
        let idx = oppHand.findIndex(t => t.endsWith('z') && oppHand.filter(x => x === t).length === 1);
        if (idx === -1) idx = Math.floor(Math.random() * oppHand.length);
        
        discards.push(oppHand.splice(idx, 1)[0]);
        render();
    };

// ... (其餘 handleMainBtn, render 等函數保持不變)
</script>
