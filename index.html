<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 32px; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; font-family: sans-serif; color: white; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        
        /* 頂部狀態欄 */
        .status-bar { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); margin-top: 8px; z-index: 20; }
        
        /* 對手區域：保留給副露與胡牌後的完整手牌 */
        .opp-zone { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px 0; background: rgba(0,0,0,0.2); min-height: 80px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .opp-melds { display: flex; gap: 5px; margin-bottom: 5px; }
        .opp-hand { display: flex; gap: 2px; }
        
        /* 棄牌區：縮小以釋放空間 */
        .discard-area { flex: 1; width: 90%; max-width: 400px; background: rgba(0,0,0,0.15); border-radius: 12px; margin: 10px 0; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 28px; gap: 3px; padding: 10px; overflow-y: auto; }
        .discard-tile { width: 20px; margin: 0 auto; }
        
        /* 操作按鈕 */
        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 95%; }
        .btn { padding: 10px 0; background: #eee; border: none; border-radius: 6px; font-weight: bold; flex: 1; color: #333; font-size: 0.9rem; }
        
        /* 玩家區域 */
        .player-zone { width: 100%; background: rgba(0,0,0,0.2); padding: 10px 0; position: relative; }
        .hand-scroll-container { width: 100%; overflow-x: auto; padding: 0 20px; box-sizing: border-box; }
        .hand-column { display: flex; flex-direction: column; gap: 10px; min-width: max-content; }
        .meld-zone { display: flex; gap: 8px; min-height: 30px; }
        .hand-row { display: flex; align-items: flex-end; min-height: 55px; gap: 3px; }
        
        .tile { width: var(--tile-w); }
        .tile img { width: 100%; border-radius: 3px; display: block; box-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .tile.selected img { outline: 3px solid var(--gold); transform: translateY(-10px); }
        
        .tile-sm { width: 22px; border-radius: 2px; }
        .meld-group { display: flex; gap: 1px; background: rgba(255,255,255,0.1); padding: 2px; border-radius: 3px; }

        .control-panel { width: 100%; display: flex; justify-content: center; padding: 15px 0 35px 0; }
        .btn-main { width: 90%; height: 50px; background: #fff; color: #d32f2f; font-size: 1.2rem; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="status-bar">
    𓃥 白六 | <span id="totalGold">1,800,000</span> 金圓 | 剩餘: <span id="deckCount">0</span> 張
</div>

<div class="opp-zone">
    <div id="oppMelds" class="opp-melds"></div>
    <div id="oppHand" class="opp-hand"></div>
</div>

<div id="discardPile" class="discard-area"></div>

<div class="action-bar">
    <button class="btn" onclick="game.modeToggle('chi')">吃</button>
    <button class="btn" onclick="game.modeToggle('peng')">碰</button>
    <button class="btn" onclick="game.modeToggle('gang')">槓</button>
    <button class="btn" style="background:var(--gold)" onclick="game.handleWin()">胡</button>
</div>

<div class="player-zone">
    <div class="hand-scroll-container">
        <div class="hand-column">
            <div id="playerMelds" class="meld-zone"></div>
            <div id="playerTiles" class="hand-row"></div>
        </div>
    </div>
</div>

<div class="control-panel">
    <button id="btn-main-action" class="btn-main" onclick="game.userAction()">摸牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], oppHand = [], oppMelds = [], discards = [];
    let playerDrawTile = null, selectedIndices = [], activeMode = null, isWaitingForDiscard = false;

    const sortTiles = (h) => [...h].sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        return (parseInt(a) + order[a.slice(-1)]) - (parseInt(b) + order[b.slice(-1)]);
    });

    const init = () => {
        deck = []; discards = []; playerMelds = []; oppMelds = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        playerHand = sortTiles(deck.splice(0,16));
        oppHand = deck.splice(0,16); // 對手手牌初始隱藏
        render();
    };

    const render = (showOpp = false) => {
        document.getElementById('deckCount').innerText = deck.length;
        
        // 渲染對手
        const om = document.getElementById('oppMelds');
        om.innerHTML = oppMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        
        const oh = document.getElementById('oppHand');
        oh.innerHTML = oppHand.map(t => `<div class="tile-sm"><img src="${svgBase}${showOpp ? t : 'back'}.svg" style="width:100%"></div>`).join('');

        // 渲染棄牌
        const dp = document.getElementById('discardPile');
        dp.innerHTML = discards.map(t => `<img class="discard-tile" src="${svgBase}${t}.svg">`).join('');
        dp.scrollTop = dp.scrollHeight;

        // 渲染玩家
        document.getElementById('playerMelds').innerHTML = playerMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${selectedIndices.includes(i)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => { selectedIndices = [i]; render(); };
            pt.appendChild(div);
        });
        if(playerDrawTile) {
            const div = document.createElement('div'); div.className = `tile draw-gap ${selectedIndices.includes(16)?'selected':''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`;
            div.onclick = () => { selectedIndices = [16]; render(); };
            pt.appendChild(div);
        }
    };

    const userAction = () => {
        if (!playerDrawTile) { playerDrawTile = deck.pop(); render(); return; }
        if (selectedIndices.length === 1) {
            const idx = selectedIndices[0];
            const discarded = (idx === 16) ? playerDrawTile : playerHand.splice(idx, 1)[0];
            discards.push(discarded);
            playerHand = sortTiles(playerHand); playerDrawTile = null; selectedIndices = [];
            render();
            // 模擬對手隨機胡牌或摸打
            setTimeout(() => { if(Math.random() < 0.05) handleWin(false); }, 500);
        }
    };

    const handleWin = (isPlayer = true) => {
        render(true); // 揭開對手手牌
        alert(isPlayer ? "恭喜您胡牌！獲得 25,000 金圓" : "對手胡牌！損失 9,000 金圓");
        init();
    };

    return { init, userAction, handleWin, modeToggle: (m)=>{} };
})();
window.onload = game.init;
</script>
</body>
</html>
