<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --tile-w: 34px; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; font-family: sans-serif; color: white; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .status-bar { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--gold); margin-top: 10px; z-index: 10; }
        
        .opp-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px 0; min-height: 110px; background: rgba(0,0,0,0.3); }
        .meld-group { display: flex; gap: 1px; background: rgba(0,0,0,0.2); padding: 2px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); }
        .tile-sm { width: 22px; border-radius: 2px; }

        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; padding: 5px; box-sizing: border-box; overflow: hidden; }
        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; height: 110px; margin: 5px; display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; padding: 10px; overflow-y: auto; }
        .discard-tile { width: 24px; margin: 0 auto; }
        .discard-tile.last { border: 2px solid var(--gold); box-shadow: 0 0 8px var(--gold); }

        .hand-scroll-view { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; padding: 15px 0; }
        .hand-container-inner { display: flex; align-items: flex-end; min-width: max-content; padding: 0 30px; gap: 3px; }
        
        .tile { width: var(--tile-w); cursor: pointer; transition: transform 0.2s; position: relative; flex-shrink: 0; }
        .tile img { width: 100%; border-radius: 3px; display: block; box-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
        .tile.selected { transform: translateY(-15px); }
        .draw-gap { margin-left: 15px; border-left: 2px solid rgba(255,255,255,0.3); padding-left: 10px; }

        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 95%; height: 45px; }
        .btn { padding: 10px 0; background: #555; border: none; border-radius: 8px; font-weight: bold; flex: 1; color: #999; font-size: 0.9rem; pointer-events: none; }
        .btn.active { background: #fff; color: #333; pointer-events: auto; box-shadow: 0 4px 0 #ccc; }
        .btn.can-win { background: var(--gold) !important; color: #000; animation: win-glow 0.6s infinite alternate; pointer-events: auto; }
        @keyframes win-glow { from { transform: scale(1); } to { transform: scale(1.05); box-shadow: 0 0 15px var(--gold); } }

        .control-panel { width: 100%; display: flex; justify-content: center; padding: 10px 0 40px 0; background: rgba(0,0,0,0.2); }
        .btn-main { width: 90%; height: 55px; background: #fff; color: #d32f2f; font-size: 1.3rem; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="status-bar">𓃥 白六 | <span id="totalGold">1,800,000</span> 金圓 | 剩餘 <span id="deckCount">0</span> 張</div>

<div class="opp-area">
    <div id="oppMelds" style="display:flex; gap:8px;"></div>
    <div id="oppHandReveal" style="display:flex; gap:2px; margin-top:8px;"></div>
</div>

<div class="mahjong-area">
    <div id="discardPile" class="discard-area"></div>
    
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.executeMeld('chi')">吃</button>
        <button id="btn-peng" class="btn" onclick="game.executeMeld('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.executeMeld('gang')">槓</button>
        <button id="btn-win" class="btn" onclick="game.checkPlayerWin()">胡</button>
    </div>

    <div id="playerMelds" style="display:flex; gap:8px; padding-left:30px; min-height:35px;"></div>
    
    <div class="hand-scroll-view" id="handScroll">
        <div class="hand-container-inner">
            <div id="playerTiles" style="display:flex; gap:3px;"></div>
            <div id="newDrawContainer"></div>
        </div>
    </div>
</div>

<div class="control-panel"><button id="btn-main-action" class="btn-main" onclick="game.handleMainBtn()">摸牌</button></div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], oppHand = [], oppMelds = [], discards = [];
    let playerDrawTile = null, selectedIdx = null, totalGold = 1800000;
    let state = "draw"; 

    // 改進的自動排序邏輯
    const sortTiles = (h) => [...h].sort((a,b) => {
        const order = {m:0, p:100, s:200, z:300};
        const va = parseInt(a) + order[a.slice(-1)];
        const vb = parseInt(b) + order[b.slice(-1)];
        return va - vb;
    });

    const isMahjong = (hand) => {
        const h = hand.filter(t => t && t !== "WAIT");
        if (h.length % 3 !== 2) return false;
        const counts = {}; h.forEach(t => counts[t] = (counts[t] || 0) + 1);
        for (let eye in counts) {
            if (counts[eye] >= 2) {
                const temp = [...h];
                temp.splice(temp.indexOf(eye), 1); temp.splice(temp.indexOf(eye), 1);
                if (validate(temp)) return true;
            }
        }
        return false;
    };

    const validate = (h) => {
        if (h.length === 0) return true;
        const sorted = sortTiles(h); const f = sorted[0];
        if (sorted.filter(x => x === f).length >= 3) {
            const next = [...sorted]; for(let i=0;i<3;i++) next.splice(next.indexOf(f), 1);
            if (validate(next)) return true;
        }
        const v = parseInt(f), s = f.slice(-1);
        if (s !== 'z') {
            const t2 = `${v+1}${s}`, t3 = `${v+2}${s}`;
            if (sorted.includes(t2) && sorted.includes(t3)) {
                const next = [...sorted];
                next.splice(next.indexOf(f),1); next.splice(next.indexOf(t2),1); next.splice(next.indexOf(t3),1);
                if (validate(next)) return true;
            }
        }
        return false;
    };

    const init = () => {
        deck = []; discards = []; playerMelds = []; oppMelds = [];
        ['m','p','s'].forEach(t => { for(let i=1;i<=9;i++) for(let j=0;j<4;j++) deck.push(`${i}${t}`); });
        for(let i=1;i<=7;i++) for(let j=0;j<4;j++) deck.push(`${i}z`); 
        for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        // 初始手牌自動排序
        playerHand = sortTiles(deck.splice(0,16)); 
        oppHand = deck.splice(0,16);
        playerDrawTile = null; state = "draw"; selectedIdx = null; render();
    };

    const render = (autoScroll = false) => {
        document.getElementById('deckCount').innerText = deck.length;
        document.getElementById('totalGold').innerText = totalGold.toLocaleString();
        
        const lastD = discards[discards.length-1];
        const canWin = isMahjong(playerDrawTile ? [...playerHand, playerDrawTile] : (lastD ? [...playerHand, lastD] : []));
        document.getElementById('btn-win').className = `btn ${canWin ? 'can-win' : ''}`;
        
        const chiBtn = document.getElementById('btn-chi'), pengBtn = document.getElementById('btn-peng'), gangBtn = document.getElementById('btn-gang');
        chiBtn.classList.remove('active'); pengBtn.classList.remove('active'); gangBtn.classList.remove('active');
        
        if (lastD && state === "draw") {
            if (playerHand.filter(x => x === lastD).length >= 2) pengBtn.classList.add('active');
            if (playerHand.filter(x => x === lastD).length >= 3) gangBtn.classList.add('active');
            const v = parseInt(lastD), s = lastD.slice(-1);
            if (s !== 'z') {
                const has = (n) => playerHand.includes(`${n}${s}`);
                if ((has(v-2)&&has(v-1)) || (has(v-1)&&has(v+1)) || (has(v+1)&&has(v+2))) chiBtn.classList.add('active');
            }
        }

        const pt = document.getElementById('playerTiles'); pt.innerHTML = '';
        playerHand.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${selectedIdx === i ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`; 
            div.onclick = () => handleTileClick(i);
            pt.appendChild(div);
        });

        const drawBox = document.getElementById('newDrawContainer'); drawBox.innerHTML = '';
        if(playerDrawTile && playerDrawTile !== "WAIT") {
            const div = document.createElement('div');
            div.id = "activeDrawTile";
            div.className = `tile draw-gap ${selectedIdx === playerHand.length ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${playerDrawTile}.svg">`; 
            div.onclick = () => handleTileClick(playerHand.length);
            drawBox.appendChild(div);
        }

        document.getElementById('playerMelds').innerHTML = playerMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        document.getElementById('oppMelds').innerHTML = oppMelds.map(g => `<div class="meld-group">${g.map(t=>`<img class="tile-sm" src="${svgBase}${t}.svg">`).join('')}</div>`).join('');
        const dp = document.getElementById('discardPile');
        dp.innerHTML = discards.map((t,idx) => `<img class="discard-tile ${idx===discards.length-1?'last':''}" src="${svgBase}${t}.svg">`).join('');
        dp.scrollTop = dp.scrollHeight;
        
        document.getElementById('btn-main-action').innerText = state === "discard" ? "選一張放出" : "摸牌";

        if (autoScroll) {
            setTimeout(() => {
                const el = document.getElementById('activeDrawTile') || pt.lastElementChild;
                el?.scrollIntoView({ behavior: 'smooth', inline: 'end', block: 'nearest' });
            }, 100);
        }
    };

    const handleTileClick = (idx) => {
        if (selectedIdx === null) {
            selectedIdx = idx;
        } else if (selectedIdx === idx) {
            selectedIdx = null;
        } else {
            if (selectedIdx < playerHand.length && idx < playerHand.length) {
                [playerHand[selectedIdx], playerHand[idx]] = [playerHand[idx], playerHand[selectedIdx]];
                selectedIdx = null;
            } else {
                selectedIdx = idx;
            }
        }
        render();
    };

    const handleMainBtn = () => {
        if (state === "draw") {
            // 摸牌前先將現有手牌排序一次（以防萬一）
            playerHand = sortTiles(playerHand);
            playerDrawTile = deck.pop();
            selectedIdx = playerHand.length; // 選中新摸到的牌
            state = "discard";
            render(true);
        } else if (state === "discard") {
            if (selectedIdx === null) return;
            let all = [...playerHand]; 
            if(playerDrawTile && playerDrawTile !== "WAIT") all.push(playerDrawTile);
            const discarded = all.splice(selectedIdx, 1)[0];
            // 出牌後，將剩餘手牌再次自動排序
            playerHand = sortTiles(all); 
            playerDrawTile = null; selectedIdx = null;
            discards.push(discarded); state = "draw"; render();
            setTimeout(() => opponentAI(discarded), 800);
        }
    };

    const executeMeld = (type) => {
        const lastD = discards.pop();
        if (type === 'peng' || type === 'gang') {
            const count = type === 'peng' ? 2 : 3;
            for(let i=0; i<count; i++) playerHand.splice(playerHand.indexOf(lastD), 1);
            playerMelds.push(new Array(count + 1).fill(lastD));
            if (type === 'gang') {
                playerDrawTile = deck.pop();
                selectedIdx = playerHand.length;
            } else playerDrawTile = "WAIT";
        } else if (type === 'chi') {
            const v = parseInt(lastD), s = lastD.slice(-1);
            let combo = playerHand.includes(`${v-1}${s}`) && playerHand.includes(`${v+1}${s}`) ? [`${v-1}${s}`, `${v+1}${s}`] :
                        playerHand.includes(`${v+1}${s}`) && playerHand.includes(`${v+2}${s}`) ? [`${v+1}${s}`, `${v+2}${s}`] : [`${v-2}${s}`, `${v-1}${s}`];
            combo.forEach(t => playerHand.splice(playerHand.indexOf(t), 1));
            playerMelds.push(sortTiles([...combo, lastD]));
            playerDrawTile = "WAIT";
        }
        // 副露後也執行一次排序
        playerHand = sortTiles(playerHand);
        state = "discard"; selectedIdx = null;
        render(true);
    };

    const opponentAI = (lastD) => {
        if (isMahjong([...oppHand, lastD])) { handleWin(false, "放槍"); return; }
        const drawn = deck.pop();
        if (isMahjong([...oppHand, drawn])) { oppHand.push(drawn); handleWin(false, "自摸"); return; }
        oppHand.push(drawn);
        discards.push(oppHand.splice(Math.floor(Math.random()*oppHand.length), 1)[0]);
        render();
    };

    const checkPlayerWin = () => {
        const lastD = discards[discards.length-1];
        if (playerDrawTile && playerDrawTile !== "WAIT" && isMahjong([...playerHand, playerDrawTile])) handleWin(true, "自摸");
        else if (isMahjong([...playerHand, lastD])) { discards.pop(); handleWin(true, "榮和"); }
    };

    const handleWin = (isP, type) => {
        document.getElementById('oppHandReveal').innerHTML = sortTiles(oppHand).map(t => `<img class="tile-sm" src="${svgBase}${t}.svg">`).join('');
        totalGold += isP ? 100000 : -100000;
        setTimeout(() => { alert(`${isP?'恭喜胡牌！':'對手胡牌'} \n類型：${type}`); init(); }, 500);
    };

    return { init, handleMainBtn, executeMeld, checkPlayerWin };
})();
window.onload = game.init;
</script>
</body>
</html>
