<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六台灣麻將</title>
    <style>
        :root { --bg-table: #2e7d32; --gold: #ffd700; --blue-back: #1565c0; }
        body { background-color: var(--bg-table); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: sans-serif; color: white; overflow: hidden; }
        
        .status-container { margin-top: 10px; text-align: center; width: 90%; }
        .status-bar { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; border: 1px solid var(--gold); display: inline-block; min-width: 200px; }
        .money-tag { font-size: 0.75rem; color: var(--gold); margin-top: 5px; }

        .mahjong-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 400px; padding: 10px; box-sizing: border-box; }

        .hand-row { display: flex; justify-content: center; align-items: flex-end; min-height: 55px; gap: 2px; }
        .meld-zone { display: flex; gap: 6px; margin-right: 10px; }
        .meld-group { display: flex; border: 1px solid rgba(255,255,255,0.4); border-radius: 3px; background: rgba(255,255,255,0.15); padding: 1px; }
        
        .tile { width: 22px; cursor: pointer; transition: transform 0.1s; position: relative; }
        .tile img { width: 100%; height: auto; display: block; border-radius: 2px; }
        .tile.selected { transform: translateY(-15px); filter: brightness(1.2); box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        .draw-gap { margin-left: 12px; }

        .cpu-tile { width: 20px; height: 28px; background-color: var(--blue-back); border: 1px solid #ccc; border-radius: 2px; }

        .discard-area { background: rgba(0,0,0,0.2); border-radius: 10px; flex: 0.8; margin: 15px 0; display: grid; grid-template-columns: repeat(9, 1fr); grid-auto-rows: 32px; gap: 4px; padding: 10px; overflow-y: auto; align-content: start; }
        .discard-tile { width: 22px; height: auto; margin: 0 auto; }

        .action-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
        .btn { padding: 10px 0; background: linear-gradient(to bottom, #fff, #e0e0e0); border: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; color: #111; flex: 1; box-shadow: 0 4px 0 #888; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #888; }
        .btn.active-mode { background: var(--gold); color: #000; box-shadow: 0 4px 0 #b8860b; }

        .control-panel { display: flex; flex-direction: column; align-items: center; width: 100%; padding-bottom: 20px; }
        .btn-main { width: 160px; background: #fff; color: #d32f2f; margin-top: 10px; }
    </style>
</head>
<body>

<div class="status-container">
    <div class="status-bar" id="status">𓃥 白六台灣麻將</div>
    <div class="money-tag">白六金圓：底 100,000 / 台 20,000</div>
</div>

<div class="mahjong-area">
    <div class="hand-row">
        <div id="cpuMelds" class="meld-zone"></div>
        <div id="cpuTiles" style="display:flex; gap:1px;"></div>
    </div>

    <div class="discard-area" id="discardPile"></div>
    
    <div class="action-bar">
        <button id="btn-chi" class="btn" onclick="game.modeSelect('chi')">吃牌</button>
        <button id="btn-peng" class="btn" onclick="game.modeSelect('peng')">碰</button>
        <button id="btn-gang" class="btn" onclick="game.modeSelect('gang')">槓</button>
        <button class="btn" onclick="game.handleWin()">胡</button>
    </div>

    <div class="hand-row" id="playerArea">
        <div id="playerMelds" class="meld-zone"></div>
        <div id="playerTiles" class="hand-row" style="min-height:auto;"></div>
    </div>
</div>

<div class="control-panel">
    <button class="btn btn-main" onclick="game.userDraw()">摸牌 / 出牌</button>
</div>

<script>
const game = (() => {
    const svgBase = `https://raw.githubusercontent.com/kuochili-ops/mahjong_graphic/main/${encodeURIComponent("Vectors 矢量图")}/SVG/`;
    let deck = [], playerHand = [], playerMelds = [], cpuHandCount = 16, cpuMelds = [];
    let lastDiscard = null, playerDrawTile = null, currentMode = null, selectedIndices = [];

    const sortTiles = (h) => h.sort((a,b) => {
        const w = {m:0, p:10, s:20, z:30};
        return (parseInt(a[0]) + w[a[1]]) - (parseInt(b[0]) + w[b[1]]);
    });

    const init = () => {
        deck = [];
        ['m', 'p', 's'].forEach(t => { for(let i=1; i<=9; i++) for(let j=0; j<4; j++) deck.push(`${i}${t}`); });
        for(let i=1; i<=7; i++) for(let j=0; j<4; j++) deck.push(`${i}z`); 
        for(let i=deck.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        
        playerHand = sortTiles(deck.splice(0, 16));
        playerMelds = []; cpuMelds = []; cpuHandCount = 16;
        playerDrawTile = null; lastDiscard = null; currentMode = null; selectedIndices = [];
        document.getElementById('discardPile').innerHTML = '';
        updateStatus("輪到你，請選擇摸牌或吃碰槓");
        render();
    };

    const updateStatus = (msg) => document.getElementById('status').innerText = msg;

    const render = () => {
        const pTiles = document.getElementById('playerTiles');
        document.getElementById('playerMelds').innerHTML = playerMelds.map(m => `
            <div class="meld-group">${m.map(t => `<div class="tile"><img src="${svgBase}${t}.svg"></div>`).join('')}</div>
        `).join('');
        
        pTiles.innerHTML = '';
        let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
        all.forEach((t, i) => {
            const div = document.createElement('div');
            const isDraw = playerDrawTile && (i === all.length - 1);
            div.className = `tile ${isDraw ? 'draw-gap' : ''} ${selectedIndices.includes(i) ? 'selected' : ''}`;
            div.innerHTML = `<img src="${svgBase}${t}.svg">`;
            div.onclick = () => {
                const idx = selectedIndices.indexOf(i);
                if (idx > -1) selectedIndices.splice(idx, 1);
                else selectedIndices.push(i);
                render();
            };
            pTiles.appendChild(div);
        });

        document.getElementById('cpuTiles').innerHTML = Array(cpuHandCount).fill('<div class="cpu-tile"></div>').join('');
        
        // 更新按鈕高亮
        ['chi', 'peng', 'gang'].forEach(m => {
            document.getElementById(`btn-${m}`).classList.toggle('active-mode', currentMode === m);
        });
    };

    const cpuTurn = () => {
        updateStatus("對手摸牌中...");
        setTimeout(() => {
            if(deck.length === 0) return alert("平局！");
            lastDiscard = deck.pop();
            document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${lastDiscard}.svg">`;
            updateStatus(`對方打出 ${lastDiscard}，輪到你操作`);
            render();
        }, 1000);
    };

    const modeSelect = (mode) => {
        if (currentMode === mode) {
            executeAction(mode); // 第二次按下，執行
        } else {
            currentMode = mode; // 第一次按下，進入選擇模式
            updateStatus(`請選擇手牌，再按一次「${mode === 'chi' ? '吃牌' : mode === 'peng' ? '碰' : '槓'}」完成`);
            render();
        }
    };

    const executeAction = (type) => {
        let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
        const selectedTiles = selectedIndices.map(i => all[i]);
        let group = [];
        let valid = false;

        if (type === 'peng' && selectedIndices.length === 2 && selectedTiles.every(t => t === lastDiscard)) {
            group = [lastDiscard, lastDiscard, lastDiscard]; valid = true;
        } else if (type === 'chi' && selectedIndices.length === 2) {
            const combined = [...selectedTiles, lastDiscard];
            const vals = combined.filter(t => t[1] === lastDiscard[1]).map(t => parseInt(t[0])).sort();
            if (vals.length === 3 && vals[2]-vals[1]===1 && vals[1]-vals[0]===1) {
                group = sortTiles(combined); valid = true;
            }
        } else if (type === 'gang') {
            if (selectedIndices.length === 3 && selectedTiles.every(t => t === lastDiscard)) {
                group = [lastDiscard, lastDiscard, lastDiscard, lastDiscard]; valid = true;
            } else if (selectedIndices.length === 4 && selectedTiles.every(t => t === selectedTiles[0])) {
                group = [...selectedTiles]; valid = true; // 暗槓
            }
        }

        if (valid) {
            playerMelds.push(group);
            selectedIndices.sort((a,b) => b-a).forEach(idx => all.splice(idx, 1));
            playerHand = sortTiles(all);
            playerDrawTile = null; selectedIndices = []; currentMode = null;
            updateStatus("動作完成！請打出一張牌");
            render();
        } else {
            updateStatus("組合無效，請重新選擇或摸牌");
            selectedIndices = []; render();
        }
    };

    const userDraw = () => {
        if (selectedIndices.length === 1) {
            // 出牌邏輯
            let all = [...playerHand]; if(playerDrawTile) all.push(playerDrawTile);
            let disc = all.splice(selectedIndices[0], 1)[0];
            document.getElementById('discardPile').innerHTML += `<img class="discard-tile" src="${svgBase}${disc}.svg">`;
            playerHand = sortTiles(all); playerDrawTile = null; selectedIndices = [];
            cpuTurn();
        } else if (!playerDrawTile) {
            // 摸牌邏輯
            if(deck.length === 0) return alert("平局！");
            playerDrawTile = deck.pop();
            updateStatus("已摸牌，請選一張牌打出");
            render();
        }
    };

    return { init, modeSelect, userDraw, handleWin: () => alert("結算白六金圓！") };
})();

window.onload = game.init;
</script>
</body>
</html>
